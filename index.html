function glyph(ch) { return FONT[ch] || FONT["?"]; }
function drawText(c, text, x, y, color, sc) {
  sc = sc || 1;
  c.fillStyle = color;
  var cx = x;
  for (var i = 0; i < text.length; i++) {
    var g = glyph(text[i]);
    var w = g[0].length;
    for (var ry = 0; ry < 5; ry++) {
      for (var rx = 0; rx < w; rx++) {
        if (g[ry][rx] === "1") {
          c.fillRect(cx + rx * sc, y + ry * sc, sc, sc);
        }
      }
    }
    cx += (w + 1) * sc;
  }
}
function textW(text, sc) {
  sc = sc || 1;
  var w = 0;
  for (var i = 0; i < text.length; i++) { w += glyph(text[i])[0].length + 1; }
  return (w - 1) * sc;
}
function drawTextC(c, text, cx, y, color, sc) {
  drawText(c, text, Math.round(cx - textW(text, sc) / 2), y, color, sc);
}
function drawLines(lines, y, dy, color, sc) {
  for (var i = 0; i < lines.length; i++) {
    drawTextC(ctx, lines[i], IW / 2, y + i * dy, color, sc);
  }
}

// ---------------------------------------------------------------------------
// Спрайты
// ---------------------------------------------------------------------------
function makeSprite(rows) {
  var h = rows.length, w = 0, y, x;
  for (y = 0; y < h; y++) { w = Math.max(w, rows[y].length); }
  var cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  var c = cv.getContext("2d");
  for (y = 0; y < h; y++) {
    for (x = 0; x < rows[y].length; x++) {
      var ch = rows[y][x];
      if (ch !== ".") {
        c.fillStyle = PAL[ch] || "#f0f";
        c.fillRect(x, y, 1, 1);
      }
    }
  }
  return cv;
}

var cardCache = {};
function cardData(key) {
  if (cardCache[key]) { return cardCache[key]; }
  var up = key.charAt(key.length - 1) === "+";
  var base = CARD_DEFS[up ? key.slice(0, -1) : key];
  var c = {
    key: key, up: up,
    name: base.name + (up ? "+" : ""),
    cost: base.cost, icon: base.icon,
    dmg: base.dmg || 0, block: base.block || 0, heal: base.heal || 0,
    poison: base.poison || 0, draw: base.draw || 0, stun: base.stun || 0,
    self: base.self || 0
  };
  if (up) {
    if (c.dmg) { c.dmg = Math.ceil(c.dmg * 1.5); }
    if (c.block) { c.block = Math.ceil(c.block * 1.5); }
    if (c.heal) { c.heal = Math.ceil(c.heal * 1.5); }
    if (c.poison) { c.poison = Math.ceil(c.poison * 1.5); }
    if (c.draw) { c.draw += 1; }
  }
  // описание
  var d1 = "", d2 = "";
  if (c.dmg) { d1 = "УРОН " + c.dmg; }
  if (c.block) { d1 = d1 ? d1 : "ЩИТ " + c.block; }
  if (c.heal && c.dmg) { d2 = "ХП +" + c.heal; }
  else if (c.heal) { d1 = "ХП +" + c.heal; }
  if (c.poison) { d1 = "ЯД " + c.poison; }
  if (c.draw) { d1 = "ДОБОР " + c.draw; }
  if (c.stun) { d2 = "СТАН"; }
  if (c.self) { d2 = "СЕБЕ -" + c.self; }
  c.desc = d1; c.desc2 = d2;
  cardCache[key] = c;
  return c;
}

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") { audioCtx.resume(); }
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx || audioCtx.state !== "running") { return; }
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var gn = audioCtx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, t);
  if (slide) { o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur); }
  gn.gain.setValueAtTime(vol || 0.12, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function newRun() {
  var minis = shuffle(MINIBOSSES.slice()).slice(0, 3);

    drawPile: [], discard: [], hand: [],

  };

function maxEnergy() { return G.baseEnergy + (hasRelic("kristall") ? 1 : 0); }
function handLimit() { return hasRelic("pero") ? 6 : 5; }

function monsterFor(floor) {
  if (floor === FLOORS) { return DRAGON; }
  var mi = MINI_FLOORS.indexOf(floor);
  if (mi >= 0) { return G.minis[mi]; }
  var pool = floor < 5 ? TIER1 : floor < 10 ? TIER2 : floor < 15 ? TIER3 : TIER4;
  return pool[Math.floor(Math.random() * pool.length)];
}

// следующий этаж: бой или событие
function nextFloor() {
  G.floor++;
  if (EVENT_FLOORS.indexOf(G.floor) >= 0) {
    startEvent();
  } else {
    beginBattle();
  }
}

function beginBattle() {
  var def = monsterFor(G.floor);
  var tierStart = G.floor < 5 ? 1 : G.floor < 10 ? 6 : G.floor < 15 ? 11 : 16;
  var scale = (def.boss || def.mini) ? 0 : (G.floor - tierStart) * 2;
  G.enemy = {
    def: def,
    name: def.name,
    hp: def.hp + scale,
    maxHp: def.hp + scale,
    atk: def.atk + ((def.boss || def.mini) ? 0 : Math.floor((G.floor - tierStart) / 2)),
    block: 0, poison: 0, stun: 0,
    step: 0
  };
  G.state = "battle";
  G.phase = "player";
  G.block = 0;
  G.playerStun = false;
  G.firstStrikeUsed = false;
  G.drawPile = shuffle(G.deck.slice());
  G.discard = [];
  G.hand = [];
  drawCards(handLimit());
  G.energy = maxEnergy();
  if (def.boss || def.mini) { sfx.boss(); }
}

function drawCards(n) {
  for (var i = 0; i < n; i++) {
    if (G.hand.length >= handLimit()) { return; }
    if (G.drawPile.length === 0) {
      if (G.discard.length === 0) { return; }
      G.drawPile = shuffle(G.discard);
      G.discard = [];
    }
    G.hand.push(G.drawPile.pop());
  }
}

function intent() {
  var e = G.enemy;
  return e.def.pattern[e.step % e.def.pattern.length];
}

function addFloater(x, y, text, color) {
  G.floaters.push({ x: x, y: y, text: text, color: color, life: 0.9 });
}

function afterEnemyDead() {
  G.phase = "dying";
  G.phaseT = 0.7;
  sfx.win();
}

function damageEnemy(n, silent) {
  var e = G.enemy;
  var absorbed = Math.min(e.block, n);
  e.block -= absorbed;
  var dealt = n - absorbed;
  e.hp -= dealt;
  G.enemyFlash = 0.18;
  if (!silent) { sfx.hit(); }
  addFloater(IW / 2 + 22, 52, "-" + dealt, dealt > 0 ? PAL.Y : PAL.S);
  if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); }
}

function playCard(idx) {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  var key = G.hand[idx];
  if (!key) { return; }
  var c = cardData(key);
  if (c.cost > G.energy) {
    addFloater(IW / 2, 150, "НЕТ ЭНЕРГИИ", PAL.R);
    return;
  }
  G.energy -= c.cost;
  G.hand.splice(idx, 1);
  G.discard.push(key);
  sfx.card();
  if (c.dmg) {
    var d = c.dmg + (hasRelic("tochilo") ? 2 : 0);
    if (hasRelic("podkova") && !G.firstStrikeUsed) {
      d *= 2;
      G.firstStrikeUsed = true;
      addFloater(IW / 2, 96, "ПОДКОВА Х2!", PAL.Y);
    } else if (c.dmg) {
      G.firstStrikeUsed = true;
    }
    damageEnemy(d);
  }
  if (c.self) {
    G.hp = Math.max(1, G.hp - c.self);
    addFloater(IW / 2 - 30, 112, "-" + c.self, PAL.P);
  }
  if (c.block) {
    var b = c.block + (hasRelic("pancir") ? 2 : 0);
    G.block += b;
    addFloater(IW / 2 - 30, 120, "+" + b, PAL.A);
    sfx.block();
  }
  if (c.heal) {
    var h = Math.min(c.heal, G.maxHp - G.hp);
    G.hp += h;
    addFloater(IW / 2 - 30, 112, "+" + h, PAL.L);
    sfx.heal();
  }
  if (c.poison && G.enemy.hp > 0) {
    var p = c.poison + (hasRelic("amulet") ? 2 : 0);
    G.enemy.poison += p;
    addFloater(IW / 2 + 22, 44, "ЯД +" + p, PAL.G);
    sfx.poison();
  }
  if (c.stun && G.enemy.hp > 0) {
    if (G.enemy.def.stunImmune) {
      addFloater(IW / 2 + 22, 44, "ИММУНИТЕТ!", PAL.S);
    } else if (G.enemy.stun > 0) {
      addFloater(IW / 2 + 22, 44, "УЖЕ ОГЛУШЁН", PAL.S);
    } else {
      G.enemy.stun = 1;
      addFloater(IW / 2 + 22, 44, "СТАН", PAL.Y);
      sfx.stun();
    }
  }
  if (c.draw) { drawCards(c.draw); }
}

function endTurn() {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  G.discard = G.discard.concat(G.hand);
  G.hand = [];
  G.phase = "enemyPoison";
  G.phaseT = 0.45;
}

function enemyPoisonTick() {
  var e = G.enemy;
  if (e.poison > 0) {
    e.hp -= e.poison;
    addFloater(IW / 2 + 22, 52, "-" + e.poison, PAL.G);
    G.enemyFlash = 0.18;
    sfx.poison();
    e.poison--;
    if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
  }
  G.phase = "enemyAct";
  G.phaseT = 0.5;
}

function hurtPlayer(dealt) {
  G.hp -= dealt;
  if (G.hp <= 0) {
    G.hp = 0;
    G.state = "dead";
    G.stateTime = 0;
    if (G.floor > best) { best = G.floor; save(); }
    sfx.dead();
    return true;
  }
  return false;
}

function enemyAct() {
  var e = G.enemy;
  if (e.stun > 0) {
    e.stun--;
    addFloater(IW / 2 + 22, 52, "СТАН!", PAL.Y);
    sfx.stun();
    G.phase = "enemyEnd";
    G.phaseT = 0.4;
    return;
  }
  var act = intent();
  e.step++;
  G.enemyLunge = 0.3;
  if (act === "a" || act === "v") {
    var dmg = e.atk;
    var absorbed = Math.min(G.block, dmg);
    G.block -= absorbed;
    var dealt = dmg - absorbed;
    G.playerFlash = 0.25;
    G.shake = 0.25;
    addFloater(IW / 2 - 30, 112, "-" + dealt, dealt > 0 ? PAL.R : PAL.S);
    if (dealt > 0) { sfx.hurt(); } else { sfx.block(); }
    if (act === "v" && dealt > 0) {
      var vh = Math.min(Math.ceil(dealt / 2), e.maxHp - e.hp);
      e.hp += vh;
      addFloater(IW / 2 + 22, 52, "+" + vh, PAL.L);
    }
    if (hurtPlayer(dealt)) { return; }
  } else if (act === "f") {
    var fd = e.def.fire || e.atk;
    G.playerFlash = 0.3;
    G.fireFlash = 0.4;
    G.shake = 0.3;
    addFloater(IW / 2 - 30, 112, "-" + fd + " ОГОНЬ", PAL.O);
    sfx.fire();
    if (hurtPlayer(fd)) { return; }
  } else if (act === "s") {
    G.playerStun = true;
    addFloater(IW / 2 - 30, 112, "СЕТЬ! -1 ЭНЕРГИЯ", PAL.Y);
    sfx.stun();
  } else if (act === "h") {
    var hh = Math.min(e.def.heal || 8, e.maxHp - e.hp);
    e.hp += hh;
    addFloater(IW / 2 + 22, 52, "+" + hh, PAL.L);
    sfx.heal();
  } else {
    var eb = 5 + (e.def.defBonus || 0) + Math.floor(G.floor / 4);
    e.block += eb;
    addFloater(IW / 2 + 22, 52, "ЩИТ +" + eb, PAL.A);
    sfx.block();
  }
  G.phase = "enemyEnd";
  G.phaseT = 0.4;
}

function startPlayerTurn() {
  G.block = 0;
  G.energy = maxEnergy();
  if (G.playerStun) {
    G.energy = Math.max(1, G.energy - 1);
    addFloater(IW / 2, 100, "ОГЛУШЁН: -1 ЭНЕРГИЯ", PAL.Y);
    G.playerStun = false;
  }
  drawCards(handLimit());
  G.phase = "player";
}

function onVictory() {
  if (hasRelic("flyaga")) {
    G.hp = Math.min(G.maxHp, G.hp + 5);
  }
  if (G.floor === FLOORS) {
    G.state = "ending";
    G.stateTime = 0;
    wins++;
    if (G.floor > best) { best = G.floor; }
    save();
    sfx.finale();
    return;
  }
  var g = 6 + G.floor + (hasRelic("koshel") ? 7 : 0);
  if (G.enemy.def.mini) { g += 20; }
  G.gold += g;
  G.rewardGold = g;
  sfx.coin();
  if (G.enemy.def.mini) {
    G.hp = Math.min(G.maxHp, G.hp + 10);
    var pool = [];
    for (var k in RELIC_DEFS) { if (!hasRelic(k)) { pool.push(k); } }
    shuffle(pool);
    G.relicChoice = pool.slice(0, 2);
    G.voice = VOICES[Math.floor(Math.random() * VOICES.length)];
    G.state = "relic";
  } else {
    var rp = shuffle(REWARD_POOL.slice());
    G.rewards = rp.slice(0, 3);
    G.state = "reward";
  }
}

function pickReward(i) {
  if (i >= 0) {
    if (G.deck.length >= DECK_MAX) {
      addFloater(IW / 2, 120, "КОЛОДА ПОЛНА!", PAL.R);
      return;
    }
    G.deck.push(G.rewards[i]);
    sfx.pick();
  } else {
    G.hp = Math.min(G.maxHp, G.hp + 6);
    sfx.heal();
  }
  nextFloor();
}

function pickRelic(i) {
  var k = G.relicChoice[i];
  if (!k) { return; }
  G.relics.push(k);
  if (k === "serdce") { G.maxHp += 12; G.hp += 12; }
  sfx.pick();
  nextFloor();
}

// ---------------------------------------------------------------------------
// События
// ---------------------------------------------------------------------------
function startEvent() {
  var idx = EVENT_FLOORS.indexOf(G.floor);
  var key = G.eventOrder[idx % G.eventOrder.length];
  G.event = { key: key, stage: 0, text: "" };
  if (key === "shop") {
    var pool = shuffle(REWARD_POOL.slice()).slice(0, 3);
    G.shopOffers = pool.map(function (k) {
      return { key: k, price: 8 + cardData(k).cost * 4 + Math.floor(Math.random() * 5), sold: false };
    });
  }
  G.state = "event";
}

function eventChoose(i) {
  var ev = G.event;
  if (ev.key === "mirror") {
    if (ev.stage === 0) {
      if (i === 0) {
        // найти случайную атакующую карту
        var idxs = [];
        for (var j = 0; j < G.deck.length; j++) {
          if (cardData(G.deck[j]).dmg > 0 && G.deck[j].indexOf("tma") < 0) { idxs.push(j); }
        }
        if (idxs.length === 0) {
          ev.text = "ЗЕРКАЛУ НЕЧЕГО ВЗЯТЬ...";
        } else {
          var di = idxs[Math.floor(Math.random() * idxs.length)];
          var old = cardData(G.deck[di]).name;
          G.deck[di] = "tma";
          ev.text = old + " СТАЛА ТЬМОЙ!";
          sfx.forge();
        }
        ev.stage = 1;
      } else { nextFloor(); }
    } else { nextFloor(); }
  } else if (ev.key === "smith") {
    if (ev.stage === 0) {
      if (i === 0 && G.gold >= 15) {
        ev.pay = "gold";
        openBag("upgrade", "event");
      } else if (i === 1 && G.maxHp > 10) {
        ev.pay = "hp";
        openBag("upgrade", "event");
      } else if (i === 2) { nextFloor(); }
    } else { nextFloor(); }
  } else if (ev.key === "fire") {
    if (ev.stage === 0) {
      if (i === 0) {
        var h = Math.min(12, G.maxHp - G.hp);
        G.hp += h;
        ev.text = "+" + h + " ХП. ТЕПЛО...";
        sfx.heal();
        ev.stage = 1;
      } else if (i === 1) {
        var plain = [];
        for (var m = 0; m < G.deck.length; m++) {
          if (!cardData(G.deck[m]).up) { plain.push(m); }
        }
        if (plain.length === 0) {
          ev.text = "ВСЕ КАРТЫ УЖЕ УЛУЧШЕНЫ!";
        } else {
          var pi = plain[Math.floor(Math.random() * plain.length)];
          G.deck[pi] = G.deck[pi] + "+";
          ev.text = cardData(G.deck[pi]).name + " ЗАКАЛЕНА В ОГНЕ!";
          sfx.forge();
        }
        ev.stage = 1;
      } else { nextFloor(); }
    } else { nextFloor(); }
  } else if (ev.key === "shop") {
    if (i < 3) {
      var offer = G.shopOffers[i];
      if (!offer || offer.sold) { return; }
      if (G.gold < offer.price) {
        addFloater(IW / 2, 150, "НЕ ХВАТАЕТ МОНЕТ", PAL.R);
        return;
      }
      if (G.deck.length >= DECK_MAX) {
        addFloater(IW / 2, 150, "КОЛОДА ПОЛНА!", PAL.R);
        return;
      }
      G.gold -= offer.price;
      G.deck.push(offer.key);
      offer.sold = true;
      sfx.coin();
    } else { nextFloor(); }
  }
}

// кузнец: карта выбрана в сумке
function smithUpgrade(deckIdx) {
  var ev = G.event;
  if (ev.pay === "gold") { G.gold -= 15; }
  else { G.maxHp -= 5; G.hp = Math.min(G.hp, G.maxHp); }
  G.deck[deckIdx] = G.deck[deckIdx] + "+";
  ev.text = cardData(G.deck[deckIdx]).name + " ГОТОВА!";
  ev.stage = 1;
  sfx.forge();
  G.state = "event";
  G.bag = null;
}

// ---------------------------------------------------------------------------
// Сумка (инвентарь)
// ---------------------------------------------------------------------------
function openBag(mode, ret) {
  G.bag = { mode: mode, ret: ret, sel: -1 };
  G.state = "bag";
}
function closeBag() {
  var ret = G.bag.ret;
  G.bag = null;
  G.state = ret;
}
function bagDuplicateIdx(sel) {
  var key = G.deck[sel];
  if (cardData(key).up) { return -1; }
  for (var i = 0; i < G.deck.length; i++) {
    if (i !== sel && G.deck[i] === key) { return i; }
  }
  return -1;
}
function bagAction(act) {
  var b = G.bag;
  if (act === "back") {
    if (b.mode === "upgrade") { G.state = "event"; G.bag = null; }
    else { closeBag(); }
    return;
  }
  if (b.sel < 0) { return; }
  if (act === "merge") {
    var dup = bagDuplicateIdx(b.sel);
    if (dup < 0) { return; }
    var key = G.deck[b.sel];
    var hi = Math.max(b.sel, dup), lo = Math.min(b.sel, dup);
    G.deck.splice(hi, 1);
    G.deck.splice(lo, 1);
    G.deck.push(key + "+");
    b.sel = -1;
    sfx.forge();
  } else if (act === "drop") {
    if (G.deck.length <= 6) {
      addFloater(IW / 2, 200, "МИНИМУМ 6 КАРТ", PAL.R);
      return;
    }
    G.deck.splice(b.sel, 1);
    b.sel = -1;
    sfx.card();
  }
}

// ---------------------------------------------------------------------------
// Ввод
// ---------------------------------------------------------------------------
function hitTest(ix, iy) {
  for (var i = G.zones.length - 1; i >= 0; i--) {
    var z = G.zones[i];
    if (ix >= z.x && ix < z.x + z.w && iy >= z.y && iy < z.y + z.h) { return z; }
  }
  return null;
}

function pointerDown(clientX, clientY) {
  initAudio();
  var r = canvas.getBoundingClientRect();
  var ix = (clientX - r.left) / r.width * IW;
  var iy = (clientY - r.top) / r.height * IH;

  if (G.state === "title") { G.state = "intro"; G.introIdx = 0; return; }
  if (G.state === "intro") {
    G.introIdx++;
    if (G.introIdx >= 2) { nextFloor(); }
    return;
  }
  if (G.state === "dead" || G.state === "ending") {
    if (G.stateTime > 0.8) { newRun(); }
    return;
  }
  var z = hitTest(ix, iy);
  if (!z) { return; }
  if (z.t === "card") { playCard(z.i); }
  else if (z.t === "end") { endTurn(); }
  else if (z.t === "reward") { pickReward(z.i); }
  else if (z.t === "skip") { pickReward(-1); }
  else if (z.t === "relic") { pickRelic(z.i); }
  else if (z.t === "opt") { eventChoose(z.i); }
  else if (z.t === "bagopen") { openBag("manage", z.i); }
  else if (z.t === "bagcard") {
    if (G.bag.mode === "upgrade") {
      if (!cardData(G.deck[z.i]).up) { smithUpgrade(z.i); }
    } else {
      G.bag.sel = G.bag.sel === z.i ? -1 : z.i;
    }
  }
  else if (z.t === "bagact") { bagAction(z.i); }
}

document.addEventListener("touchstart", function (e) {
  e.preventDefault();
  if (e.changedTouches.length > 0) {
    pointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}, { passive: false });
["touchmove", "touchend", "touchcancel"].forEach(function (ev) {
  document.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
});
document.addEventListener("mousedown", function (e) { pointerDown(e.clientX, e.clientY); });
document.addEventListener("dblclick", function (e) { e.preventDefault(); });

window.addEventListener("keydown", function (e) {
  initAudio();
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    if (G.state === "title") { G.state = "intro"; G.introIdx = 0; }
    else if (G.state === "intro") {
      G.introIdx++;
      if (G.introIdx >= 2) { nextFloor(); }
    }
    else if ((G.state === "dead" || G.state === "ending") && G.stateTime > 0.8) { newRun(); }
    else if (G.state === "battle") { endTurn(); }
  }
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= 6) {
    if (G.state === "battle") { playCard(n - 1); }
    else if (G.state === "reward" && n <= 3) { pickReward(n - 1); }
    else if (G.state === "relic" && n <= 2) { pickRelic(n - 1); }
    else if (G.state === "event" && n <= 4) { eventChoose(n - 1); }
  }
  if (e.key === "0" && G.state === "reward") { pickReward(-1); }
});

// ---------------------------------------------------------------------------
// Обновление
// ---------------------------------------------------------------------------
function update(dt) {
  G.time += dt;
  G.stateTime += dt;
  if (G.shake > 0) { G.shake -= dt; }
  if (G.enemyFlash > 0) { G.enemyFlash -= dt; }
  if (G.playerFlash > 0) { G.playerFlash -= dt; }
  if (G.fireFlash > 0) { G.fireFlash -= dt; }
  if (G.enemyLunge > 0) { G.enemyLunge -= dt; }

  for (var i = G.floaters.length - 1; i >= 0; i--) {
    var f = G.floaters[i];
    f.life -= dt;
    f.y -= 12 * dt;
    if (f.life <= 0) { G.floaters.splice(i, 1); }
  }

  if (G.state === "battle" && G.phase !== "player") {
    G.phaseT -= dt;
    if (G.phaseT <= 0) {
      if (G.phase === "enemyPoison") { enemyPoisonTick(); }
      else if (G.phase === "enemyAct") { enemyAct(); }
      else if (G.phase === "enemyEnd") { startPlayerTurn(); }
      else if (G.phase === "dying") { onVictory(); }
    }
  }
}

// ---------------------------------------------------------------------------
// Отрисовка
// ---------------------------------------------------------------------------
function drawPanel(x, y, w, h, fill) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
}

function drawBar(x, y, w, h, val, max, color) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = PAL.D;
  ctx.fillRect(x, y, w, h);
  var fw = Math.max(0, Math.round(w * val / max));
  ctx.fillStyle = color;
  ctx.fillRect(x, y, fw, h);
}

function drawBackground() {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(0, 0, IW, IH);
  var deep = G.floor >= 15 ? "#2a1a26" : G.floor >= 10 ? "#241d30" : "#20233a";
  ctx.fillStyle = deep;
  for (var y = 0; y < IH; y += 10) {
    for (var x = -8; x < IW; x += 16) {
      var off = (y / 10) % 2 ? 8 : 0;
      ctx.fillRect(x + off, y, 14, 8);
    }
  }
  var fl = Math.floor(G.time * 6) % 2;
  ctx.fillStyle = PAL.B;
  ctx.fillRect(14, 30, 2, 6); ctx.fillRect(IW - 16, 30, 2, 6);
  ctx.fillStyle = fl ? PAL.O : PAL.Y;
  ctx.fillRect(13, 26, 4, 4); ctx.fillRect(IW - 17, 26, 4, 4);
  ctx.fillStyle = fl ? PAL.Y : PAL.O;
  ctx.fillRect(14, 24, 2, 3); ctx.fillRect(IW - 16, 24, 2, 3);
}

function drawGold(x, y) {
  ctx.drawImage(SPR.coin, x, y);
  drawText(ctx, String(G.gold), x + 8, y + 1, PAL.Y);
}

function drawCardFace(x, y, w, h, key, dim, zoneType, zoneI, sel) {
  var c = cardData(key);
  drawPanel(x, y, w, h, sel ? PAL.C : c.up ? PAL.O : dim ? PAL.E : PAL.Y);
  ctx.fillStyle = key.indexOf("tma") === 0 ? PAL.P : dim ? PAL.S : PAL.W;
  ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
  var ic = SPR[c.icon];
  ctx.drawImage(ic, x + Math.round((w - 9) / 2), y + 3);
  if (h >= 28) {
    var nameCol = key.indexOf("tma") === 0 ? PAL.W : c.up ? PAL.O : PAL.K;
    drawTextC(ctx, c.name, x + w / 2, y + 14, nameCol);
    var descCol = key.indexOf("tma") === 0 ? PAL.M : dim ? PAL.E : PAL.P;
    drawTextC(ctx, c.desc, x + w / 2, y + 21, descCol);
    if (c.desc2) { drawTextC(ctx, c.desc2, x + w / 2, y + 27, descCol); }
  }
  drawPanel(x - 1, y - 1, 7, 7, dim ? PAL.E : PAL.B);
  drawText(ctx, String(c.cost), x + 1, y, PAL.W);
  if (c.up) {
    ctx.fillStyle = PAL.Y;
    ctx.fillRect(x + w - 4, y - 1, 3, 3);
  }
  if (zoneType) {
    G.zones.push({ t: zoneType, i: zoneI, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
  }
}

function drawBagButton(retState) {
  var x = 4, y = IH - 16;
  drawPanel(x, y, 42, 13, PAL.N);
  ctx.drawImage(SPR.bag, x + 2, y + 2);
  drawText(ctx, "СУМКА", x + 13, y + 4, PAL.W);
  G.zones.push({ t: "bagopen", i: retState, x: x - 2, y: y - 2, w: 46, h: 17 });
}

function drawBattle() {
  var shx = G.shake > 0 ? Math.round((Math.random() - 0.5) * 4) : 0;
  ctx.save();
  ctx.translate(shx, 0);

  var e = G.enemy;
  var isBig = e.def.boss || e.def.mini;

  // враг (с выпадом при действии)
  var sp = SPR[e.def.key];
  var esc = 3;
  var ew = sp.width * esc, eh = sp.height * esc;
  var ex = Math.round((IW - ew) / 2);
  var lunge = G.enemyLunge > 0 ? Math.round(G.enemyLunge * 14) : 0;
  var ey = 60 - eh + Math.round(Math.sin(G.time * 2.5) * 2) + lunge;

  if (G.enemyFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.save();
    ctx.filter = "brightness(3)";
    ctx.drawImage(sp, ex, ey, ew, eh);
    ctx.restore();
  } else {
    ctx.drawImage(sp, ex, ey, ew, eh);
  }

  // верхняя панель
  var floorTxt = "ЭТАЖ " + G.floor + "/" + FLOORS;
  drawPanel(2, 2, textW(floorTxt) + 5, 9, PAL.K);
  drawText(ctx, floorTxt, 4, 4, isBig ? PAL.R : PAL.W);
  drawPanel(IW - 34, 2, 32, 9, PAL.K);
  drawGold(IW - 32, 3);
  for (var i = 0; i < G.relics.length; i++) {
    ctx.drawImage(SPR[RELIC_DEFS[G.relics[i]].icon], IW - 12 - i * 11, 13);
  }

  // намерение врага
  var showIntent = (G.phase === "player" || G.phase === "enemyPoison") && G.hp > 0;
  if (showIntent) {
    var ixx = 6, iyy = 20;
    var lbl = "", icn = null, col = PAL.W;
    if (e.stun > 0) { icn = SPR.mStun; lbl = "СТАН"; col = PAL.Y; }
    else {
      var it = intent();
      if (it === "a") { icn = SPR.mSword; lbl = String(e.atk); col = PAL.R; }
      else if (it === "v") { icn = SPR.mDrain; lbl = e.atk + "+ХИЛ"; col = PAL.R; }
      else if (it === "f") { icn = SPR.mFire; lbl = (e.def.fire || e.atk) + "!"; col = PAL.O; }
      else if (it === "s") { icn = SPR.mWeb; lbl = "СЕТЬ"; col = PAL.Y; }
      else if (it === "h") { icn = SPR.mHeal; lbl = "ХИЛ"; col = PAL.L; }
      else { icn = SPR.mShield; lbl = "ЩИТ"; col = PAL.A; }
    }
    drawPanel(ixx - 3, iyy - 3, textW(lbl) + 16, 13, PAL.K);
    ctx.drawImage(icn, ixx, iyy);
    drawText(ctx, lbl, ixx + 9, iyy + 1, col);
  }

  drawTextC(ctx, e.name, IW / 2, 64, isBig ? PAL.Y : PAL.W);
  drawBar(IW / 2 - 30, 71, 60, 4, e.hp, e.maxHp, PAL.R);
  drawTextC(ctx, e.hp + "/" + e.maxHp, IW / 2, 77, PAL.W);
  if (e.block > 0) {
    ctx.drawImage(SPR.mShield, IW / 2 + 34, 69);
    drawText(ctx, String(e.block), IW / 2 + 42, 70, PAL.A);
  }
  if (e.poison > 0) {
    ctx.drawImage(SPR.mSkull, IW / 2 - 52, 69);
    drawText(ctx, String(e.poison), IW / 2 - 44, 70, PAL.G);
  }

  // игрок
  var py = 92;
  if (G.playerFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.fillStyle = G.fireFlash > 0 ? "rgba(239,125,87,0.4)" : "rgba(177,62,83,0.35)";
    ctx.fillRect(0, py - 4, IW, 32);
  }
  ctx.drawImage(SPR.heart, 6, py);
  drawBar(16, py + 1, 62, 5, G.hp, G.maxHp, PAL.L);
  drawText(ctx, G.hp + "/" + G.maxHp, 82, py, PAL.W);
  var me = maxEnergy();
  for (i = 0; i < me; i++) {
    if (i < G.energy) {
      ctx.drawImage(SPR.bolt, 8 + i * 8, py + 10);
    } else {
      ctx.fillStyle = PAL.D;
      ctx.fillRect(9 + i * 8, py + 11, 3, 5);
    }
  }
  drawText(ctx, "ЭНЕРГИЯ", 8 + me * 8 + 4, py + 11, PAL.S);
  if (G.block > 0) {
    ctx.drawImage(SPR.mShield, 112, py + 10);
    drawText(ctx, String(G.block), 121, py + 11, PAL.A);
  }

  // рука (до 6 карт)
  var hy = 126, n = G.hand.length;
  var cw = n > 5 ? 22 : 26, gap = n > 5 ? 1 : 2, chh = 34;
  var total = n * (cw + gap) - gap;
  var hx0 = Math.round((IW - total) / 2);
  drawText(ctx, "РУКА", 4, hy - 8, PAL.E);
  var pileTxt = G.drawPile.length + "/" + G.discard.length;
  drawText(ctx, pileTxt, IW - textW(pileTxt) - 4, hy - 8, PAL.E);
  for (i = 0; i < n; i++) {
    var key = G.hand[i];
    var dim = cardData(key).cost > G.energy || G.phase !== "player";
    drawCardFace(hx0 + i * (cw + gap), hy, cw, chh, key, dim, "card", i, false);
  }
  if (n === 0 && G.phase === "player") {
    drawTextC(ctx, "НЕТ КАРТ", IW / 2, hy + 14, PAL.E);
  }

  var by = 170, bw = 64, bh = 14;
  var bx = Math.round((IW - bw) / 2);
  var active = G.phase === "player";
  drawPanel(bx, by, bw, bh, active ? PAL.R : PAL.D);
  drawTextC(ctx, "КОНЕЦ ХОДА", bx + bw / 2, by + 5, active ? PAL.W : PAL.E);
  if (active) { G.zones.push({ t: "end", i: 0, x: bx - 2, y: by - 2, w: bw + 4, h: bh + 4 }); }

  if (G.floor === 1 && G.time < 10) {
    drawLines(["ТАП ПО КАРТЕ = СЫГРАТЬ",
               "ЗНАЧОК СЛЕВА = ХОД ВРАГА",
               "ЩИТ СГОРАЕТ КАЖДЫЙ ХОД"], 192, 8, PAL.S);
  }
  if (e.def.boss) {
    drawTextC(ctx, "ПЛАМЯ БЬЁТ СКВОЗЬ ЩИТ!", IW / 2, 192, PAL.O);
  }

  ctx.restore();
}

function drawReward() {
  drawTextC(ctx, "ПОБЕДА!", IW / 2, 20, PAL.Y, 2);
  drawTextC(ctx, "+" + G.rewardGold + " МОНЕТ", IW / 2, 38, PAL.Y);
  ctx.drawImage(SPR.coin, IW / 2 + textW("+" + G.rewardGold + " МОНЕТ") / 2 + 3, 37);
  drawTextC(ctx, "ВОЗЬМИ КАРТУ:", IW / 2, 54, PAL.S);

  var cw = 34, chh = 42, gap = 6;
  var total = 3 * (cw + gap) - gap;
  var x0 = Math.round((IW - total) / 2);
  for (var i = 0; i < 3; i++) {
    drawCardFace(x0 + i * (cw + gap), 66, cw, chh, G.rewards[i], false, "reward", i, false);
  }

  var bw = 84, bh = 14, bx = Math.round((IW - bw) / 2), by = 126;
  drawPanel(bx, by, bw, bh, PAL.T);
  drawTextC(ctx, "ПРОПУСК: ХП +6", bx + bw / 2, by + 5, PAL.W);
  G.zones.push({ t: "skip", i: 0, x: bx - 2, y: by - 2, w: bw + 4, h: bh + 4 });

  ctx.drawImage(SPR.heart, 24, 152);
  drawText(ctx, G.hp + "/" + G.maxHp, 34, 153, PAL.W);
  drawGold(74, 152);
  var dc = "КОЛОДА " + G.deck.length + "/" + DECK_MAX;
  drawTextC(ctx, dc, IW / 2, 166, G.deck.length >= DECK_MAX ? PAL.R : PAL.S);

  drawBagButton("reward");
}

function drawRelicChoice() {
  drawTextC(ctx, "СТРАЖ ПОВЕРЖЕН!", IW / 2, 14, PAL.Y, 2);
  drawTextC(ctx, "ХП +10  МОНЕТЫ +" + G.rewardGold, IW / 2, 32, PAL.L);
  drawTextC(ctx, "ГОЛОС ИЗ ГЛУБИНЫ:", IW / 2, 46, PAL.M);
  drawTextC(ctx, G.voice, IW / 2, 54, PAL.M);
  drawTextC(ctx, "ВЫБЕРИ РЕЛИКВИЮ:", IW / 2, 70, PAL.S);
  drawTextC(ctx, "ОНА ОСТАНЕТСЯ НАВСЕГДА", IW / 2, 78, PAL.E);

  for (var i = 0; i < G.relicChoice.length; i++) {
    var k = G.relicChoice[i];
    var d = RELIC_DEFS[k];
    var w = 120, h = 26;
    var x = Math.round((IW - w) / 2), y = 92 + i * 34;
    drawPanel(x, y, w, h, PAL.N);
    ctx.drawImage(SPR[d.icon], x + 5, y + 8);
    drawText(ctx, d.name, x + 20, y + 5, PAL.Y);
    drawText(ctx, d.desc, x + 20, y + 14, PAL.W);
    G.zones.push({ t: "relic", i: i, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
  }

  drawBagButton("relic");
}

// --- события ---
function drawOption(text, y, enabled, idx) {
  var w = Math.max(90, textW(text) + 14), h = 14;
  var x = Math.round((IW - w) / 2);
  drawPanel(x, y, w, h, enabled ? PAL.T : PAL.D);
  drawTextC(ctx, text, IW / 2, y + 5, enabled ? PAL.W : PAL.E);
  if (enabled) {
    G.zones.push({ t: "opt", i: idx, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
  }
}

function drawEvent() {
  var ev = G.event;
  var floorTxt = "ЭТАЖ " + G.floor + "/" + FLOORS;
  drawText(ctx, floorTxt, 4, 4, PAL.W);
  drawGold(IW - 32, 3);

  if (ev.key === "mirror") {
    drawTextC(ctx, "СТРАННОЕ ЗЕРКАЛО", IW / 2, 22, PAL.C, 2);
    var msc = 3;
    ctx.drawImage(SPR.mirror, Math.round((IW - 12 * msc) / 2), 40, 12 * msc, 14 * msc);
    if (ev.stage === 0) {
      drawLines(["В ОТРАЖЕНИИ ТЫ ВИДИШЬ",
                 "ТЁМНУЮ ВЕРСИЮ СВОЕЙ КАРТЫ.",
                 "ОНА СИЛЬНЕЕ. НО РАНИТ ТЕБЯ.",
                 "",
                 "ТЬМА: УРОН 15, СЕБЕ -3"], 92, 9, PAL.W);
      drawOption("ОБМЕНЯТЬ КАРТУ", 148, true, 0);
      drawOption("УЙТИ", 168, true, 1);
    } else {
      drawTextC(ctx, ev.text, IW / 2, 100, PAL.M);
      drawOption("ДАЛЬШЕ", 148, true, 0);
    }
  } else if (ev.key === "smith") {
    drawTextC(ctx, "КУЗНЕЦ ГЛУБИН", IW / 2, 22, PAL.O, 2);
    ctx.drawImage(SPR.smith, 40, 42, 20, 26);
    ctx.drawImage(SPR.anvil, 70, 56, 30, 16);
    if (ev.stage === 0) {
      drawLines(["Я МОГУ УСИЛИТЬ ТВОЮ КАРТУ.",
                 "ПЛАТИ МОНЕТАМИ...",
                 "ИЛИ СОБСТВЕННОЙ КРОВЬЮ."], 84, 9, PAL.W);
      drawOption("ЗА 15 МОНЕТ", 120, G.gold >= 15, 0);
      drawOption("ЗА -5 МАКС ХП", 140, G.maxHp > 10, 1);
      drawOption("УЙТИ", 160, true, 2);
    } else {
      drawTextC(ctx, ev.text, IW / 2, 96, PAL.Y);
      drawOption("ДАЛЬШЕ", 148, true, 0);
    }
  } else if (ev.key === "fire") {
    drawTextC(ctx, "КОСТЁР", IW / 2, 22, PAL.Y, 2);
    var fsp = Math.floor(G.time * 5) % 2 ? SPR.fire1 : SPR.fire2;
    ctx.drawImage(fsp, Math.round((IW - 36) / 2), 44, 36, 33);
    if (ev.stage === 0) {
      drawLines(["ТИХОЕ МЕСТО СРЕДИ ТЬМЫ.",
                 "МОЖНО ПЕРЕВЕСТИ ДУХ."], 88, 9, PAL.W);
      drawOption("ОТДЫХ: +12 ХП", 116, true, 0);
      drawOption("ЗАКАЛКА: УЛУЧШИТЬ КАРТУ", 136, true, 1);
      drawOption("ИДТИ ДАЛЬШЕ", 156, true, 2);
    } else {
      drawTextC(ctx, ev.text, IW / 2, 96, PAL.L);
      drawOption("ДАЛЬШЕ", 148, true, 0);
    }
  } else if (ev.key === "shop") {
    drawTextC(ctx, "ТОРГОВЕЦ", IW / 2, 16, PAL.G, 2);
    ctx.drawImage(SPR.merchant, IW / 2 - 12, 32, 24, 26);
    drawTextC(ctx, "КУПИШЬ ЧТО-НИБУДЬ?", IW / 2, 62, PAL.W);
    var cw = 34, chh = 42, gap = 6;
    var total = 3 * (cw + gap) - gap;
    var x0 = Math.round((IW - total) / 2);
    for (var i = 0; i < 3; i++) {
      var offer = G.shopOffers[i];
      var x = x0 + i * (cw + gap);
      if (offer.sold) {
        drawPanel(x, 74, cw, chh, PAL.D);
        drawTextC(ctx, "ПРОДАНО", x + cw / 2, 92, PAL.E);
      } else {
        drawCardFace(x, 74, cw, chh, offer.key, G.gold < offer.price, "opt", i, false);
        ctx.drawImage(SPR.coin, x + 6, 120);
        drawText(ctx, String(offer.price), x + 14, 121, G.gold >= offer.price ? PAL.Y : PAL.R);
      }
    }
    var dc = "КОЛОДА " + G.deck.length + "/" + DECK_MAX;
    drawTextC(ctx, dc, IW / 2, 136, G.deck.length >= DECK_MAX ? PAL.R : PAL.S);
    drawOption("УЙТИ", 150, true, 3);
  }
  drawBagButton("event");
}

// --- сумка ---
function drawBag() {
  var b = G.bag;
  drawTextC(ctx, b.mode === "upgrade" ? "ВЫБЕРИ КАРТУ ДЛЯ КУЗНЕЦА" : "СУМКА", IW / 2, 8, PAL.Y,
            b.mode === "upgrade" ? 1 : 2);
  var dc = "КОЛОДА " + G.deck.length + "/" + DECK_MAX;
  drawTextC(ctx, dc, IW / 2, b.mode === "upgrade" ? 18 : 24, PAL.S);
  drawGold(4, 4);

  // сетка карт 6 в ряд
  var cw = 21, chh = 26, gap = 2;
  var perRow = 6;
  var x0 = Math.round((IW - (perRow * (cw + gap) - gap)) / 2);
  var y0 = 34;
  for (var i = 0; i < G.deck.length; i++) {
    var col = i % perRow, row = Math.floor(i / perRow);
    var x = x0 + col * (cw + gap), y = y0 + row * (chh + 4);
    var c = cardData(G.deck[i]);
    var dimIt = b.mode === "upgrade" && c.up;
    drawCardFace(x, y, cw, chh, G.deck[i], dimIt, "bagcard", i, b.sel === i);
  }

  // панель выбранной карты
  var py = 34 + Math.ceil(DECK_MAX / perRow) * 30 + 6;
  if (b.mode !== "upgrade" && b.sel >= 0 && b.sel < G.deck.length) {
    var sc2 = cardData(G.deck[b.sel]);
    drawPanel(8, py, IW - 16, 24, PAL.N);
    drawText(ctx, sc2.name, 14, py + 4, sc2.up ? PAL.O : PAL.W);
    var dsc = sc2.desc + (sc2.desc2 ? "  " + sc2.desc2 : "") + "  ЦЕНА " + sc2.cost;
    drawText(ctx, dsc, 14, py + 13, PAL.S);

    var canMerge = bagDuplicateIdx(b.sel) >= 0;
    var byy = py + 30;
    drawPanel(8, byy, 62, 14, canMerge ? PAL.G : PAL.D);
    drawTextC(ctx, "ОБЪЕДИНИТЬ", 8 + 31, byy + 5, canMerge ? PAL.K : PAL.E);
    if (canMerge) { G.zones.push({ t: "bagact", i: "merge", x: 6, y: byy - 2, w: 66, h: 18 }); }
    drawPanel(76, byy, 62, 14, G.deck.length > 6 ? PAL.R : PAL.D);
    drawTextC(ctx, "ВЫБРОСИТЬ", 76 + 31, byy + 5, G.deck.length > 6 ? PAL.W : PAL.E);
    G.zones.push({ t: "bagact", i: "drop", x: 74, y: byy - 2, w: 66, h: 18 });
  } else if (b.mode !== "upgrade") {
    drawTextC(ctx, "ТАП ПО КАРТЕ = ВЫБРАТЬ", IW / 2, py + 6, PAL.E);
    drawTextC(ctx, "2 ОДИНАКОВЫЕ = УЛУЧШЕННАЯ", IW / 2, py + 16, PAL.E);
  } else {
    drawTextC(ctx, "УЛУЧШЕННЫЕ КАРТЫ НЕЛЬЗЯ", IW / 2, py + 6, PAL.E);
    drawTextC(ctx, "УЛУЧШИТЬ ДВАЖДЫ", IW / 2, py + 16, PAL.E);
  }

  var bky = IH - 20;
  drawPanel(Math.round((IW - 60) / 2), bky, 60, 14, PAL.B);
  drawTextC(ctx, "НАЗАД", IW / 2, bky + 5, PAL.W);
  G.zones.push({ t: "bagact", i: "back", x: (IW - 60) / 2 - 2, y: bky - 2, w: 64, h: 18 });
}

function drawTitle() {
  drawTextC(ctx, "ДРАКОНЬЕ", IW / 2, 26, PAL.Y, 2);
  drawTextC(ctx, "ПОДЗЕМЕЛЬЕ", IW / 2, 42, PAL.O, 2);

  var sp = SPR.dragon;
  ctx.drawImage(sp, Math.round((IW - sp.width * 3) / 2), 60, sp.width * 3, sp.height * 3);
  ctx.drawImage(SPR.princess, 14, 78, 20, 28);
  ctx.drawImage(SPR.knight, IW - 36, 78, 20, 28);

  drawLines(["КАРТОЧНЫЙ РОГАЛИК", "СПАСИ ПРИНЦЕССУ ОТ ДРАКОНА"], 128, 10, PAL.W);
  drawLines(["20 ЭТАЖЕЙ ВНИЗ",
             "СТРАЖИ НА 5/10/15 - РЕЛИКВИИ",
             "СОБЫТИЯ, МОНЕТЫ, ПРОКАЧКА",
             "НА ДНЕ ЖДЁТ ДРАКОН"], 152, 8, PAL.S);
  if (best > 0) { drawTextC(ctx, "РЕКОРД: ЭТАЖ " + best, IW / 2, 192, PAL.L); }
  if (wins > 0) { drawTextC(ctx, "СПАСЕНИЙ: " + wins, IW / 2, 202, PAL.M); }

  if (Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = НАЧАТЬ", IW / 2, 224, PAL.C);
  }
}

function drawIntro() {
  if (G.introIdx === 0) {
    var sp = SPR.dragon;
    ctx.drawImage(sp, Math.round((IW - sp.width * 3) / 2), 40, sp.width * 3, sp.height * 3);
    ctx.drawImage(SPR.princess, IW / 2 + 40, 78, 20, 28);
    drawLines(["ДРАКОН ПОХИТИЛ ПРИНЦЕССУ",
               "И УНЁС ЕЁ НА САМОЕ ДНО",
               "ПОДЗЕМЕЛЬЯ..."], 128, 10, PAL.W);
    drawLines(["ИЗ ГЛУБИНЫ СЛЫШЕН",
               "ЕЁ ГОЛОС: ПОМОГИТЕ!"], 158, 10, PAL.M);
  } else {
    ctx.drawImage(SPR.knight, Math.round(IW / 2 - 15), 30, 30, 42);
    drawLines(["ТЫ - РЫЦАРЬ С КОЛОДОЙ КАРТ.",
               "СПУСТИСЬ НА " + FLOORS + " ЭТАЖЕЙ.",
               "",
               "СТРАЖИ ДАЮТ РЕЛИКВИИ.",
               "В ПУТИ ЖДУТ СОБЫТИЯ:",
               "ЗЕРКАЛО, КУЗНЕЦ, КОСТЁР...",
               "",
               "МОНЕТЫ - ЗА ПОБЕДЫ.",
               "ДУБЛИ КАРТ ОБЪЕДИНЯЙ В СУМКЕ.",
               "",
               "НА ДНЕ ЖДЁТ ДРАКОН."], 84, 9, PAL.W);
  }
  if (Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ДАЛЬШЕ", IW / 2, 224, PAL.C);
  }
}

function drawEnding() {
  var t = G.stateTime;
  var sp = SPR.dragon;
  var dy = Math.min(1, t / 1.5);
  ctx.save();
  ctx.globalAlpha = 1 - dy * 0.7;
  ctx.drawImage(sp, Math.round((IW - sp.width * 2) / 2), 30 + dy * 20, sp.width * 2, sp.height * 2);
  ctx.restore();

  ctx.drawImage(SPR.knight, IW / 2 - 32, 90, 20, 28);
  ctx.drawImage(SPR.princess, IW / 2 + 12, 90, 20, 28);
  if (t > 1) {
    var hb = Math.floor(G.time * 3) % 2;
    ctx.drawImage(SPR.heart, IW / 2 - 4, 84 - (hb ? 2 : 0));
  }

  drawTextC(ctx, "ДРАКОН ПОВЕРЖЕН!", IW / 2, 134, PAL.Y, 2);
  drawTextC(ctx, "ПРИНЦЕССА СПАСЕНА!", IW / 2, 152, PAL.M);
  drawLines(["РЫЦАРЬ И ПРИНЦЕССА",
             "ПОДНИМАЮТСЯ К СОЛНЦУ.",
             "КОНЕЦ."], 170, 9, PAL.W);
  drawTextC(ctx, "ВСЕГО СПАСЕНИЙ: " + wins, IW / 2, 204, PAL.L);
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = В НАЧАЛО", IW / 2, 224, PAL.C);
  }
}

function drawDead() {
  ctx.fillStyle = "rgba(26,28,44,0.8)";
  ctx.fillRect(0, 0, IW, IH);
  drawTextC(ctx, "ТЫ ПАЛ", IW / 2, 70, PAL.R, 2);
  drawTextC(ctx, "ЭТАЖ " + G.floor + " ИЗ " + FLOORS, IW / 2, 96, PAL.W);
  drawTextC(ctx, "ПРИНЦЕССА ВСЁ ЕЩЁ ЖДЁТ...", IW / 2, 110, PAL.M);
  if (G.floor >= best && best > 0) {
    drawTextC(ctx, "НОВЫЙ РЕКОРД!", IW / 2, 124, PAL.Y);
  }
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ЗАНОВО", IW / 2, 150, PAL.C);
  }
}

function draw() {
  G.zones = [];
  drawBackground();
  if (G.state === "title") { drawTitle(); }
  else if (G.state === "intro") { drawIntro(); }
  else if (G.state === "battle") { drawBattle(); }
  else if (G.state === "reward") { drawReward(); }
  else if (G.state === "relic") { drawRelicChoice(); }
  else if (G.state === "event") { drawEvent(); }
  else if (G.state === "bag") { drawBag(); }
  else if (G.state === "ending") { drawEnding(); }
  else if (G.state === "dead") { drawBattle(); drawDead(); }

  for (var i = 0; i < G.floaters.length; i++) {
    var f = G.floaters[i];
    drawTextC(ctx, f.text, f.x, Math.round(f.y), f.color);
  }
}

var lastT = performance.now();
function frame(now) {
  var dt = Math.max(0, Math.min(0.033, (now - lastT) / 1000));
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
