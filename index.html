function glyph(ch) { return FONT[ch] || FONT["?"]; }
function drawText(c, text, x, y, color, sc) {
  sc = sc || 1;
  c.fillStyle = color;
  var cx = x;
  for (var i = 0; i < text.length; i++) {
    var g = glyph(text[i]);
    var w = g[0].length;
    for (var ry = 0; ry < 5; ry++) {
      for (var rx = 0; rx < w; rx++) {
        if (g[ry][rx] === "1") {
          c.fillRect(cx + rx * sc, y + ry * sc, sc, sc);
        }
      }
    }
    cx += (w + 1) * sc;
  }
}
function textW(text, sc) {
  sc = sc || 1;
  var w = 0;
  for (var i = 0; i < text.length; i++) { w += glyph(text[i])[0].length + 1; }
  return (w - 1) * sc;
}
function drawTextC(c, text, cx, y, color, sc) {
  drawText(c, text, Math.round(cx - textW(text, sc) / 2), y, color, sc);
}
function drawLines(lines, y, dy, color, sc) {
  for (var i = 0; i < lines.length; i++) {
    drawTextC(ctx, lines[i], IW / 2, y + i * dy, color, sc);
  }
}

// ---------------------------------------------------------------------------
// Спрайты
// ---------------------------------------------------------------------------
function makeSprite(rows) {
  var h = rows.length, w = 0, y, x;
  for (y = 0; y < h; y++) { w = Math.max(w, rows[y].length); }
  var cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  var c = cv.getContext("2d");
  for (y = 0; y < h; y++) {
    for (x = 0; x < rows[y].length; x++) {
      var ch = rows[y][x];
      if (ch !== ".") {
        c.fillStyle = PAL[ch] || "#f0f";
        c.fillRect(x, y, 1, 1);
      }
    }
  }
  return cv;
}

function cardLevel(key) {

  if (c.block) { parts.push("ЩИТ " + c.block); }
  if (c.poison) { parts.push("ЯД " + c.poison); }
  if (c.regen) { parts.push("РЕГЕН " + c.regen[0] + "Х" + c.regen[1]); }
  if (c.energy) { parts.push("ЭНЕРГИЯ +" + c.energy); }
  if (c.draw) { parts.push("ДОБОР " + c.draw); }
  if (c.heal) { parts.push("ХП +" + c.heal); }
  if (c.pierce) { parts.push("ПРОБОЙ"); }
  if (c.burn) { parts.push("ПОДЖОГ " + c.burn); }
  if (c.spikes) { parts.push("ШИПЫ"); }
  if (c.keepBlock) { parts.push("НЕ СГОРАЕТ"); }
  if (c.purge) { parts.push("РВЁТ СЕТЬ"); }
  if (c.stun) { parts.push("СТАН"); }
  if (c.self) { parts.push("СЕБЕ -" + c.self); }
  c.desc = parts[0] || "";
  c.desc2 = parts[1] || "";
  cardCache[key] = c;
  return c;
}

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") { audioCtx.resume(); }
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx || audioCtx.state !== "running") { return; }
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var gn = audioCtx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, t);
  if (slide) { o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur); }
  gn.gain.setValueAtTime(vol || 0.12, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// --- генерация карты акта ---
function genAct(act) {
  var counts = [1];
  for (var r = 1; r < ROWS - 1; r++) { counts.push(2 + Math.floor(Math.random() * 2)); }
  counts.push(1);
  var rows = [];
  for (r = 0; r < ROWS; r++) {
    var n = counts[r];
    var row = [];
    for (var i = 0; i < n; i++) {
      var type = "fight";
      if (r === ROWS - 1) { type = act === ACTS ? "dragon" : "boss"; }
      else if (r > 0) {
        var roll = Math.random();
        if (roll < 0.42) { type = "fight"; }
        else if (roll < 0.57) { type = act === 1 && r === 1 ? "fight" : "elite"; }
        else if (roll < 0.77) { type = "event"; }
        else if (roll < 0.87) { type = "treasure"; }
        else if (roll < 0.94) { type = "fire"; }
        else { type = "shop"; }
      }
      row.push({
        type: type,
        x: Math.round(IW / 2 + (i - (n - 1) / 2) * 38),
        edges: [], done: false
      });
    }
    rows.push(row);
  }
  // гарантия: хотя бы один костёр и один торговец в акте
  function forceType(t) {
    for (var rr = 1; rr < ROWS - 1; rr++) {
      for (var ii = 0; ii < rows[rr].length; ii++) {
        if (rows[rr][ii].type === t) { return; }
      }
    }
    var rr2 = 2 + Math.floor(Math.random() * (ROWS - 3));
    var ii2 = Math.floor(Math.random() * rows[rr2].length);
    rows[rr2][ii2].type = t;
  }
  forceType("fire");
  forceType("shop");
  forceType("event");
  // рёбра
  for (r = 0; r < ROWS - 1; r++) {
    var a = rows[r], b = rows[r + 1];
    for (i = 0; i < a.length; i++) {
      var j = a.length === 1 ? Math.floor(Math.random() * b.length)
            : Math.round(i * (b.length - 1) / Math.max(1, a.length - 1));
      a[i].edges.push(j);
      if (Math.random() < 0.4) {
        var j2 = Math.min(b.length - 1, Math.max(0, j + (Math.random() < 0.5 ? -1 : 1)));
        if (a[i].edges.indexOf(j2) < 0) { a[i].edges.push(j2); }
      }
    }
    // каждый узел следующего ряда должен быть достижим
    for (var jj = 0; jj < b.length; jj++) {
      var reachable = false;
      for (i = 0; i < a.length; i++) {
        if (a[i].edges.indexOf(jj) >= 0) { reachable = true; break; }
      }
      if (!reachable) {
        var near = 0, bd = 999;
        for (i = 0; i < a.length; i++) {
          var d = Math.abs(rows[r][i].x - b[jj].x);
          if (d < bd) { bd = d; near = i; }
        }
        a[near].edges.push(jj);
      }
    }
  }
  return rows;
}

function addParts(x, y, color, count, spd) {
  for (var i = 0; i < count; i++) {
    G.parts.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * (spd || 40),
      vy: -Math.random() * (spd || 40) - 10,
      life: 0.4 + Math.random() * 0.4,
      color: color
    });
  }
}

// --- вход в узел карты ---
function enterNode(r, i) {
  G.pos = { r: r, i: i };
  G.mapRows[r][i].done = true;
  G.fade = 0.5;
  G.floaters = [];
  G.parts = [];
  sfx.step();
  var type = G.mapRows[r][i].type;
  G.nodeType = type;
  if (type === "fight" || type === "elite") { beginBattle(type); }
  else if (type === "boss") { beginBattle("boss"); }
  else if (type === "dragon") { G.state = "lair"; G.stateTime = 0; }
  else if (type === "event") { startEvent(); }
  else if (type === "fire") { G.event = { key: "firecamp", stage: 0, text: "" }; G.state = "event"; }
  else if (type === "shop") { openShop(); }
  else if (type === "treasure") { openTreasure(); }
}

function returnToMap() {
  G.fade = 0.5;
  if (G.pos.r === ROWS - 1) {
    // конец акта
    if (G.act < ACTS) {
      G.state = "interlude";
      G.stateTime = 0;
    }
    return;
  }
  G.state = "map";
}

function nextAct() {
  G.act++;
  G.mapRows = genAct(G.act);
  G.pos = { r: -1, i: 0 };
  G.state = "map";
  G.fade = 0.5;
}

function pickEnemy(nodeType) {
  if (nodeType === "boss") { return { def: G.minis[G.act - 1], boost: 0 }; }
  if (nodeType === "dragon") { return { def: DRAGON, boost: 0 }; }
  var r = G.pos.r;
  var pool = (nodeType === "elite" || r >= 3) ? TIER_LATE[G.act - 1] : TIER_EARLY[G.act - 1];
  var def = pool[Math.floor(Math.random() * pool.length)];
  return { def: def, boost: nodeType === "elite" ? 1 : 0 };
}

function foeTraits(e) {
  var t = [];
  if (e.elite) { t.push("ЭЛИТА: БОЛЬШЕ ХП И УРОНА"); }
  if (e.def.stunImmune) { t.push("ИММУНИТЕТ К СТАНУ"); }
  if (e.pattern.indexOf("f") >= 0) { t.push("ОГОНЬ БЬЁТ СКВОЗЬ ЩИТ"); }
  if (e.pattern.indexOf("s") >= 0) { t.push("СЕТЬ: -1 ЭНЕРГИЯ ТЕБЕ"); }
  if (e.pattern.indexOf("v") >= 0) { t.push("ВАМПИРИЗМ: ПЬЁТ ТВОЮ КРОВЬ"); }
  if (e.pattern.indexOf("h") >= 0) { t.push("ЛЕЧИТ СЕБЯ"); }
  if (e.def.defBonus) { t.push("ТОЛСТАЯ БРОНЯ"); }
  if (e.def.boss) { t.push("ЯРОСТЬ НА ПОЛОВИНЕ ХП"); }
  return t;
}

function beginBattle(nodeType) {
  var pick = pickEnemy(nodeType);
  var def = pick.def;
  var hp = def.hp + (def.mini ? (G.act - 1) * 5 : def.boss ? 0 : G.pos.r * 2);
  var atk = def.atk;
  if (pick.boost) { hp = Math.ceil(hp * 1.35); atk += 2; }
  G.enemy = {
    def: def,
    name: (pick.boost ? "ЭЛИТНЫЙ " : "") + def.name,
    hp: hp, maxHp: hp, atk: atk,
    fire: def.fire || 0,
    pattern: def.pattern,
    elite: !!pick.boost,
    enraged: false,
    block: 0, poison: 0, burn: 0, stun: 0,
    step: 0
  };
  G.phase = "player";
  G.block = 0;
  G.playerStun = false;
  G.firstStrikeUsed = false;
  G.firstPoisonUsed = false;
  G.mirrorUsed = false;
  G.spikes = false;
  G.keepBlock = false;
  G.regen = null;
  G.cardsThisTurn = 0;
  G.energyNext = 0;
  G.drawPile = shuffle(G.deck.slice());
  G.discard = [];
  G.hand = [];
  drawCards(handLimit());
  G.energy = maxEnergy();
  if (def.boss) { sfx.roar(); }
  else if (def.mini || pick.boost) { sfx.boss(); }
  // экран особенностей врага перед боем (у дракона это экран логова)
  if (nodeType !== "dragon" && foeTraits(G.enemy).length > 0) {
    G.state = "foe";
    G.stateTime = 0;
  } else {
    G.state = "battle";
  }
}

function drawCards(n) {
  for (var i = 0; i < n; i++) {
    if (G.hand.length >= handLimit()) { return; }
    if (G.drawPile.length === 0) {
      if (G.discard.length === 0) { return; }
      G.drawPile = shuffle(G.discard);
      G.discard = [];
    }
    G.hand.push(G.drawPile.pop());
  }
}

function intent() {
  var e = G.enemy;
  return e.pattern[e.step % e.pattern.length];
}

function addFloater(x, y, text, color) {
  G.floaters.push({ x: x, y: y, text: text, color: color, life: 0.9 });
}

function afterEnemyDead() {
  G.phase = "dying";
  G.phaseT = 0.7;
  addParts(IW / 2, 50, PAL.Y, 14, 60);
  sfx.win();
}

function damageEnemy(n, silent, pierce) {
  var e = G.enemy;
  var absorbed = pierce ? 0 : Math.min(e.block, n);
  if (!pierce) { e.block -= absorbed; }
  var dealt = n - absorbed;
  e.hp -= dealt;
  G.enemyFlash = 0.18;
  if (dealt > 0) { addParts(IW / 2 + (Math.random() - 0.5) * 20, 46, PAL.Y, 4, 50); }
  if (!silent) { sfx.hit(); }
  addFloater(IW / 2 + 22, 52, "-" + dealt, dealt > 0 ? PAL.Y : PAL.S);
  // ярость дракона на половине здоровья
  if (e.def.boss && !e.enraged && e.hp > 0 && e.hp <= e.maxHp / 2) {
    e.enraged = true;
    e.pattern = "afaf";
    e.atk += 1;
    e.fire += 2;
    addFloater(IW / 2, 40, "ДРАКОН В ЯРОСТИ!", PAL.O);
    sfx.roar();
  }
  if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); }
}

function playCard(idx) {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  var key = G.hand[idx];
  if (!key) { return; }
  var c = cardData(key);
  if (c.curse) {
    addFloater(IW / 2, 150, "ПРОКЛЯТИЕ! НЕИГРАЕМА", PAL.P);
    return;
  }
  if (c.cost > G.energy) {
    addFloater(IW / 2, 150, "НЕТ ЭНЕРГИИ", PAL.R);
    return;
  }
  // анимация улетающей карты
  var n = G.hand.length;
  var cw = n > 5 ? 22 : 26, gap = n > 5 ? 1 : 2;
  var hx0 = Math.round((IW - (n * (cw + gap) - gap)) / 2);
  G.cardFx = { key: key, x: hx0 + idx * (cw + gap), y: 126, t: 0.3 };

  G.energy -= c.cost;
  G.hand.splice(idx, 1);
  G.discard.push(key);
  sfx.card();
  // ШЕСТЕРНЯ: каждая 3-я карта за ход бьёт врага
  G.cardsThisTurn++;
  if (hasRelic("shester") && G.cardsThisTurn % 3 === 0 && G.enemy.hp > 0) {
    addFloater(IW / 2, 96, "ШЕСТЕРНЯ!", PAL.S);
    damageEnemy(4, true);
  }
  var atkDmg = c.taran ? G.block + c.dmg : c.dmg;
  if (atkDmg > 0 && G.enemy.hp > 0) {
    var d = atkDmg + (hasRelic("tochilo") && c.cost >= 1 ? 2 : 0);
    // ПОДКОВА: х2 только для дешёвых атак (цена <= 2) — бомбой не ваншотнуть
    if (hasRelic("podkova") && !G.firstStrikeUsed && c.cost <= 2) {
      d *= 2;
      addFloater(IW / 2, 96, "ПОДКОВА Х2!", PAL.Y);
    }
    G.firstStrikeUsed = true;
    for (var hIdx = 0; hIdx < c.hits && G.enemy.hp > 0; hIdx++) {
      damageEnemy(d, hIdx > 0, c.pierce);
    }
  }
  if (c.self) {
    G.hp = Math.max(1, G.hp - c.self);
    addFloater(IW / 2 - 30, 112, "-" + c.self, PAL.P);
  }
  if (c.block) {
    var b = c.block + (hasRelic("pancir") ? 2 : 0);
    G.block += b;
    addFloater(IW / 2 - 30, 120, "+" + b, PAL.A);
    sfx.block();
  }
  if (c.spikes) {
    G.spikes = true;
    addFloater(IW / 2 - 30, 128, "ШИПЫ!", PAL.O);
  }
  if (c.keepBlock) { G.keepBlock = true; }
  if (c.heal) {
    var h = Math.min(c.heal, G.maxHp - G.hp);
    G.hp += h;
    addFloater(IW / 2 - 30, 112, "+" + h, PAL.L);
    sfx.heal();
  }
  if (c.regen) {
    G.regen = { amt: c.regen[0], turns: c.regen[1] };
    addFloater(IW / 2 - 30, 112, "РЕГЕН " + c.regen[0], PAL.L);
    sfx.heal();
  }
  if (c.energy) {
    G.energy += c.energy;
    addFloater(IW / 2 - 30, 120, "ЭНЕРГИЯ +" + c.energy, PAL.Y);
  }
  if (c.purge && G.playerStun) {
    G.playerStun = false;
    addFloater(IW / 2 - 30, 120, "СЕТЬ СНЯТА", PAL.C);
  }
  if (c.poison && G.enemy.hp > 0) {
    var p = c.poison + (hasRelic("amulet") ? 2 : 0);
    // ЗМЕЯ: первый яд в бою удвоен
    if (hasRelic("zmeya") && !G.firstPoisonUsed) {
      p *= 2;
      addFloater(IW / 2, 96, "ЗМЕЯ Х2!", PAL.G);
    }
    G.firstPoisonUsed = true;
    G.enemy.poison += p;
    addFloater(IW / 2 + 22, 44, "ЯД +" + p, PAL.G);
    sfx.poison();
  }
  if (c.burn && G.enemy.hp > 0) {
    G.enemy.burn += c.burn;
    addFloater(IW / 2 + 22, 44, "ГОРИТ +" + c.burn, PAL.O);
    sfx.fire();
  }
  if (c.stun && G.enemy.hp > 0) {
    if (G.enemy.def.stunImmune) {
      addFloater(IW / 2 + 22, 44, "ИММУНИТЕТ!", PAL.S);
    } else if (G.enemy.stun > 0) {
      addFloater(IW / 2 + 22, 44, "УЖЕ ОГЛУШЁН", PAL.S);
    } else {
      G.enemy.stun = 1;
      addFloater(IW / 2 + 22, 44, "СТАН", PAL.Y);
      sfx.stun();
      // КУВАЛДА: стан даёт +10 урона
      if (hasRelic("kuvalda") && G.enemy.hp > 0) {
        addFloater(IW / 2, 96, "КУВАЛДА!", PAL.S);
        damageEnemy(10, true);
      }
    }
  }
  if (c.draw) { drawCards(c.draw); }
}

function endTurn() {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  // БАНКА: активный ход даёт энергию на следующий
  if (hasRelic("banka") && G.cardsThisTurn >= 4) { G.energyNext = 1; }
  G.discard = G.discard.concat(G.hand);
  G.hand = [];
  G.phase = "enemyPoison";
  G.phaseT = 0.45;
}

function enemyPoisonTick() {
  var e = G.enemy;
  if (e.poison > 0) {
    e.hp -= e.poison;
    addFloater(IW / 2 + 22, 52, "-" + e.poison, PAL.G);
    G.enemyFlash = 0.18;
    sfx.poison();
    e.poison--;
    if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
  }
  // горение (сквозь щит) + СВЕЧА
  var burnDmg = (e.burn > 0 ? e.burn : 0) + (hasRelic("svecha") ? 1 : 0);
  if (burnDmg > 0) {
    e.hp -= burnDmg;
    addFloater(IW / 2 + 34, 52, "-" + burnDmg, PAL.O);
    G.enemyFlash = 0.18;
    if (e.burn > 0) { e.burn--; }
    if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
  }
  G.phase = "enemyAct";
  G.phaseT = 0.5;
}

function hurtPlayer(dealt) {
  G.hp -= dealt;
  if (dealt > 0) { addParts(IW / 2, 108, PAL.R, 6, 40); }
  if (G.hp <= 0) {
    G.hp = 0;
    G.state = "dead";
    G.stateTime = 0;
    if (floorNum() > best) { best = floorNum(); save(); }
    sfx.dead();
    return true;
  }
  return false;
}

function enemyAct() {
  var e = G.enemy;
  if (e.stun > 0) {
    e.stun--;
    addFloater(IW / 2 + 22, 52, "СТАН!", PAL.Y);
    sfx.stun();
    G.phase = "enemyEnd";
    G.phaseT = 0.4;
    return;
  }
  var act = intent();
  e.step++;
  G.enemyLunge = 0.3;
  if (act === "a" || act === "v") {
    var dmg = e.atk;
    var absorbed = Math.min(G.block, dmg);
    G.block -= absorbed;
    var dealt = dmg - absorbed;
    G.playerFlash = 0.25;
    G.shake = 0.25;
    addFloater(IW / 2 - 30, 112, "-" + dealt, dealt > 0 ? PAL.R : PAL.S);
    if (dealt > 0) { sfx.hurt(); } else { sfx.block(); }
    if (act === "v" && dealt > 0) {
      var vh = Math.min(Math.ceil(dealt / 2), e.maxHp - e.hp);
      e.hp += vh;
      addFloater(IW / 2 + 22, 52, "+" + vh, PAL.L);
    }
    // шипы (БЛОК++ и ВЕНЕЦ) + ЗЕРКАЛЬЦЕ
    var reflect = (hasRelic("venets") ? 2 : 0) + (G.spikes ? Math.floor(dmg / 3) : 0);
    if (hasRelic("zerkalce") && !G.mirrorUsed) {
      reflect += 5;
      G.mirrorUsed = true;
      addFloater(IW / 2, 96, "ЗЕРКАЛЬЦЕ!", PAL.C);
    }
    if (reflect > 0 && e.hp > 0) {
      e.hp -= reflect;
      addFloater(IW / 2 + 22, 52, "-" + reflect + " ШИПЫ", PAL.O);
      G.enemyFlash = 0.18;
    }
    if (hurtPlayer(dealt)) { return; }
    if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
  } else if (act === "f") {
    var fd = e.fire || e.atk;
    G.playerFlash = 0.3;
    G.fireFlash = 0.4;
    G.shake = 0.3;
    addFloater(IW / 2 - 30, 112, "-" + fd + " ОГОНЬ", PAL.O);
    sfx.fire();
    if (hurtPlayer(fd)) { return; }
  } else if (act === "s") {
    G.playerStun = true;
    addFloater(IW / 2 - 30, 112, "СЕТЬ! -1 ЭНЕРГИЯ", PAL.Y);
    sfx.stun();
  } else if (act === "h") {
    var hh = Math.min(e.def.heal || 8, e.maxHp - e.hp);
    e.hp += hh;
    addFloater(IW / 2 + 22, 52, "+" + hh, PAL.L);
    sfx.heal();
  } else {
    var eb = 5 + (e.def.defBonus || 0) + G.act;
    e.block += eb;
    addFloater(IW / 2 + 22, 52, "ЩИТ +" + eb, PAL.A);
    sfx.block();
    // КОЛОКОЛ: щит врага звенит по нему самому
    if (hasRelic("kolokol") && e.hp > 0) {
      e.hp -= 3;
      addFloater(IW / 2 + 40, 52, "-3 ЗВОН", PAL.Y);
      G.enemyFlash = 0.15;
      if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
    }
  }
  G.phase = "enemyEnd";
  G.phaseT = 0.4;
}

function startPlayerTurn() {
  // СТЕНА++: щит не сгорает
  if (G.keepBlock) {
    G.keepBlock = false;
    if (G.block > 0) { addFloater(IW / 2 - 30, 120, "ЩИТ ЦЕЛ", PAL.A); }
  } else {
    G.block = 0;
  }
  G.spikes = false;
  G.cardsThisTurn = 0;
  G.energy = maxEnergy() + G.energyNext;
  if (G.energyNext > 0) { addFloater(IW / 2, 100, "БАНКА: +1 ЭНЕРГИЯ", PAL.Y); }
  G.energyNext = 0;
  if (G.playerStun) {
    G.energy = Math.max(1, G.energy - 1);
    addFloater(IW / 2, 100, "ОГЛУШЁН: -1 ЭНЕРГИЯ", PAL.Y);
    G.playerStun = false;
  }
  if (G.regen && G.regen.turns > 0) {
    var rh = Math.min(G.regen.amt, G.maxHp - G.hp);
    G.hp += rh;
    G.regen.turns--;
    if (rh > 0) { addFloater(IW / 2 - 30, 112, "+" + rh + " РЕГЕН", PAL.L); }
  }
  drawCards(handLimit());
  G.phase = "player";
}

function onVictory() {
  if (hasRelic("flyaga")) {
    G.hp = Math.min(G.maxHp, G.hp + 4);
  }
  if (G.nodeType === "dragon") {
    G.state = "ending";
    G.stateTime = 0;
    wins++;
    best = ACTS * ROWS;
    save();
    sfx.finale();
    return;
  }
  var g = 4 + G.act * 3 + (hasRelic("koshel") ? 6 : 0);
  if (G.enemy.elite) { g += 12; }
  if (G.enemy.def.mini) { g += 18; }
  G.gold += g;
  G.rewardGold = g;
  addParts(IW / 2, 80, PAL.Y, 10, 50);
  sfx.coin();
  if (G.enemy.def.mini) {
    G.hp = Math.min(G.maxHp, G.hp + 8);
    var pool = [];
    for (var k in RELIC_DEFS) { if (!hasRelic(k)) { pool.push(k); } }
    shuffle(pool);
    G.relicChoice = pool.slice(0, 2);
    G.voice = VOICES[Math.floor(Math.random() * VOICES.length)];
    G.state = "relic";
  } else {
    var rp = shuffle(REWARD_POOL.slice()).slice(0, 3);
    G.rewardUp = G.enemy.elite;
    G.rewards = G.rewardUp ? rp.map(function (k) { return k + "+"; }) : rp;
    G.state = "reward";
  }
}

function pickReward(i) {
  if (i >= 0) {
    if (G.deck.length >= DECK_MAX) {
      addFloater(IW / 2, 120, "КОЛОДА ПОЛНА!", PAL.R);
      return;
    }
    G.deck.push(G.rewards[i]);
    sfx.pick();
  } else {
    G.hp = Math.min(G.maxHp, G.hp + 4);
    sfx.heal();
  }
  returnToMap();
}

function pickRelic(i) {
  var k = G.relicChoice[i];
  if (!k) { return; }
  G.relics.push(k);
  if (k === "serdce") { G.maxHp += 10; G.hp += 10; }
  sfx.pick();
  returnToMap();
}

// ---------------------------------------------------------------------------
// Узлы: торговец, сокровище
// ---------------------------------------------------------------------------
function openShop() {
  var pool = shuffle(REWARD_POOL.slice()).slice(0, 3);
  G.shopOffers = pool.map(function (k) {
    return { key: k, price: 9 + cardData(k).cost * 4 + Math.floor(Math.random() * 5), sold: false };
  });
  G.shopRelic = randomRelic();
  G.state = "shop";
}

function shopChoose(i) {
  if (i < 3) {
    var offer = G.shopOffers[i];
    if (!offer || offer.sold) { return; }
    if (G.gold < offer.price) { addFloater(IW / 2, 160, "НЕ ХВАТАЕТ МОНЕТ", PAL.R); return; }
    if (G.deck.length >= DECK_MAX) { addFloater(IW / 2, 160, "КОЛОДА ПОЛНА!", PAL.R); return; }
    G.gold -= offer.price;
    G.deck.push(offer.key);
    offer.sold = true;
    sfx.coin();
  } else if (i === 3) {
    // реликвия за 45
    if (!G.shopRelic) { return; }
    if (G.gold < 45) { addFloater(IW / 2, 160, "НЕ ХВАТАЕТ МОНЕТ", PAL.R); return; }
    G.gold -= 45;
    G.relics.push(G.shopRelic);
    if (G.shopRelic === "serdce") { G.maxHp += 10; G.hp += 10; }
    G.shopRelic = null;
    sfx.pick();
  } else if (i === 4) {
    // лечение за 25
    if (G.gold < 25 || G.hp >= G.maxHp) { return; }
    G.gold -= 25;
    G.hp = Math.min(G.maxHp, G.hp + 15);
    sfx.heal();
  } else {
    returnToMap();
  }
}

function openTreasure() {
  var roll = Math.random();
  var t;
  if (roll < 0.55) {
    var g = 18 + G.act * 6 + Math.floor(Math.random() * 8);
    G.gold += g;
    t = { icon: "chest", title: "СУНДУК С ЗОЛОТОМ", lines: ["+" + g + " МОНЕТ"] };
    sfx.coin();
  } else if (roll < 0.8) {
    var rk = randomRelic();
    if (rk) {
      G.relics.push(rk);
      if (rk === "serdce") { G.maxHp += 10; G.hp += 10; }
      t = { icon: "chest", title: "ДРЕВНИЙ СУНДУК", lines: ["РЕЛИКВИЯ: " + RELIC_DEFS[rk].name, RELIC_DEFS[rk].desc] };
      sfx.pick();
    } else {
      G.gold += 30;
      t = { icon: "chest", title: "СУНДУК С ЗОЛОТОМ", lines: ["+30 МОНЕТ"] };
      sfx.coin();
    }
  } else {
    var dmg = 7;
    G.hp = Math.max(1, G.hp - dmg);
    var g2 = 20 + G.act * 5;
    G.gold += g2;
    t = { icon: "chest", title: "МИМИК!", lines: ["СУНДУК КУСАЕТСЯ: -" + dmg + " ХП", "НО ВНУТРИ +" + g2 + " МОНЕТ"] };
    sfx.bad();
  }
  G.treasure = t;
  G.state = "treasure";
}

// ---------------------------------------------------------------------------
// События
// ---------------------------------------------------------------------------
function startEvent() {
  if (G.eventPool.length === 0) {
    G.eventPool = shuffle(["mirror", "smith", "obval", "gambler", "altar", "wounded", "spirit"]);
  }
  var key = G.eventPool.pop();
  G.event = { key: key, stage: 0, text: "" };
  G.state = "event";
}

function dropRandomCard() {
  if (G.deck.length <= 6) { return null; }
  var i = Math.floor(Math.random() * G.deck.length);
  var name = cardData(G.deck[i]).name;
  G.deck.splice(i, 1);
  return name;
}

function eventChoose(i) {
  var ev = G.event;
  if (ev.stage === 1) { returnToMap(); return; }

  if (ev.key === "mirror") {
    if (i === 0) {
      var idxs = [];
      for (var j = 0; j < G.deck.length; j++) {
        if (cardData(G.deck[j]).dmg > 0 && G.deck[j].indexOf("tma") < 0) { idxs.push(j); }
      }
      if (idxs.length === 0) { ev.text = "ЗЕРКАЛУ НЕЧЕГО ВЗЯТЬ..."; }
      else {
        var di = idxs[Math.floor(Math.random() * idxs.length)];
        var old = cardData(G.deck[di]).name;
        G.deck[di] = "tma";
        ev.text = old + " СТАЛА ТЬМОЙ!";
        sfx.forge();
      }
      ev.stage = 1;
    } else { returnToMap(); }
  } else if (ev.key === "smith") {
    if (i === 0 && G.gold >= 20) { ev.pay = "gold"; openBag("upgrade", "event"); }
    else if (i === 1 && G.maxHp > 10) { ev.pay = "hp"; openBag("upgrade", "event"); }
    else if (i === 2) { returnToMap(); }
  } else if (ev.key === "firecamp") {
    if (i === 0) {
      var h = Math.min(10, G.maxHp - G.hp);
      G.hp += h;
      ev.text = "+" + h + " ХП. ТЕПЛО...";
      sfx.heal();
      ev.stage = 1;
    } else if (i === 1) {
      var plain = [];
      for (var m = 0; m < G.deck.length; m++) {
        if (cardData(G.deck[m]).lvl < 2 && !cardData(G.deck[m]).curse) { plain.push(m); }
      }
      if (plain.length === 0) { ev.text = "ВСЕ КАРТЫ УЖЕ УЛУЧШЕНЫ!"; }
      else {
        var pi = plain[Math.floor(Math.random() * plain.length)];
        G.deck[pi] = G.deck[pi] + "+";
        ev.text = cardData(G.deck[pi]).name + " ЗАКАЛЕНА В ОГНЕ!";
        sfx.forge();
      }
      ev.stage = 1;
    } else { returnToMap(); }
  } else if (ev.key === "obval") {
    if (i === 0) {
      G.hp = Math.max(1, G.hp - 15);
      ev.text = "ОСТРЫЕ КАМНИ... -15 ХП";
      sfx.bad();
      ev.stage = 1;
    } else if (i === 1 && G.gold >= 20) {
      G.gold -= 20;
      ev.text = "КИРКА КУПЛЕНА. ПУТЬ СВОБОДЕН";
      sfx.coin();
      ev.stage = 1;
    } else if (i === 2) {
      var dropped = dropRandomCard();
      ev.text = dropped ? "ПОТЕРЯНА КАРТА: " + dropped : "РАЗОБРАЛ ЗАВАЛ ГОЛЫМИ РУКАМИ";
      sfx.bad();
      ev.stage = 1;
    }
  } else if (ev.key === "gambler") {
    if (i === 0 && G.gold >= 15) {
      G.gold -= 15;
      if (Math.random() < 0.5) {
        G.gold += 35;
        ev.text = "ГОБЛИН ВОЕТ! ТЫ ВЫИГРАЛ 35!";
        sfx.coin();
      } else {
        ev.text = "ГОБЛИН ХИХИКАЕТ. МОНЕТЫ ТЮ-ТЮ";
        sfx.bad();
      }
      ev.stage = 1;
    } else { returnToMap(); }
  } else if (ev.key === "altar") {
    if (i === 0) {
      G.hp = Math.max(1, G.hp - 7);
      var count = 0;
      for (var a = 0; a < G.deck.length && count < 2; a++) {
        var cd = cardData(G.deck[a]);
        if (cd.lvl < 2 && !cd.curse) { G.deck[a] = G.deck[a] + "+"; count++; }
      }
      ev.text = "-7 ХП. УЛУЧШЕНО КАРТ: " + count;
      sfx.forge();
      ev.stage = 1;
    } else if (i === 1) {
      G.gold += 30;
      G.deck.push("curse");
      ev.text = "+30 МОНЕТ... И ПРОКЛЯТИЕ В КОЛОДЕ";
      sfx.bad();
      ev.stage = 1;
    } else { returnToMap(); }
  } else if (ev.key === "wounded") {
    if (i === 0 && G.gold >= 15) {
      G.gold -= 15;
      G.maxHp += 7;
      G.hp += 7;
      ev.text = "РЫЦАРЬ ДЕЛИТСЯ ОПЫТОМ: +7 МАКС ХП";
      sfx.heal();
      ev.stage = 1;
    } else if (i === 1) {
      G.gold += 25;
      G.deck.push("curse");
      ev.text = "+25 МОНЕТ. СОВЕСТЬ ПРОКЛИНАЕТ ТЕБЯ";
      sfx.bad();
      ev.stage = 1;
    } else { returnToMap(); }
  } else if (ev.key === "spirit") {
    var h2 = Math.min(8, G.maxHp - G.hp);
    G.hp += h2;
    G.voice = VOICES[Math.floor(Math.random() * VOICES.length)];
    ev.text = "+" + h2 + " ХП";
    sfx.heal();
    ev.stage = 1;
  }
}

function smithUpgrade(deckIdx) {
  var ev = G.event;
  if (ev.pay === "gold") { G.gold -= 20; }
  else { G.maxHp -= 5; G.hp = Math.min(G.hp, G.maxHp); }
  G.deck[deckIdx] = G.deck[deckIdx] + "+";
  ev.text = cardData(G.deck[deckIdx]).name + " ГОТОВА!";
  ev.stage = 1;
  sfx.forge();
  G.state = "event";
  G.bag = null;
}

// ---------------------------------------------------------------------------
// Сумка
// ---------------------------------------------------------------------------
function openBag(mode, ret) {
  G.bag = { mode: mode, ret: ret, sel: -1 };
  G.state = "bag";
}
function closeBag() {
  var ret = G.bag.ret;
  G.bag = null;
  G.state = ret;
}
function bagDuplicateIdx(sel) {
  var key = G.deck[sel];
  // объединять можно карты не максимального уровня (два "+" = предел)
  if (cardData(key).lvl >= 2 || cardData(key).curse) { return -1; }
  for (var i = 0; i < G.deck.length; i++) {
    if (i !== sel && G.deck[i] === key) { return i; }
  }
  return -1;
}
function bagAction(act) {
  var b = G.bag;
  if (act === "back") {
    if (b.mode === "upgrade") { G.state = "event"; G.bag = null; }
    else { closeBag(); }
    return;
  }
  if (b.sel < 0) { return; }
  if (act === "merge") {
    var dup = bagDuplicateIdx(b.sel);
    if (dup < 0) { return; }
    var key = G.deck[b.sel];
    var hi = Math.max(b.sel, dup), lo = Math.min(b.sel, dup);
    G.deck.splice(hi, 1);
    G.deck.splice(lo, 1);
    G.deck.push(key + "+");
    b.sel = -1;
    sfx.forge();
  } else if (act === "drop") {
    var isCurse = cardData(G.deck[b.sel]).curse;
    if (G.deck.length <= 6 && !isCurse) {
      addFloater(IW / 2, 200, "МИНИМУМ 6 КАРТ", PAL.R);
      return;
    }
    G.deck.splice(b.sel, 1);
    b.sel = -1;
    sfx.card();
  }
}

// ---------------------------------------------------------------------------
// Ввод
// ---------------------------------------------------------------------------
function hitTest(ix, iy) {
  for (var i = G.zones.length - 1; i >= 0; i--) {
    var z = G.zones[i];
    if (ix >= z.x && ix < z.x + z.w && iy >= z.y && iy < z.y + z.h) { return z; }
  }
  return null;
}

function pointerDown(clientX, clientY) {
  initAudio();
  var r = canvas.getBoundingClientRect();
  var ix = (clientX - r.left) / r.width * IW;
  var iy = (clientY - r.top) / r.height * IH;

  if (G.state === "title") { G.state = "intro"; G.introIdx = 0; return; }
  if (G.state === "intro") {
    G.introIdx++;
    if (G.introIdx >= 2) { G.state = "map"; G.fade = 0.5; }
    return;
  }
  if (G.state === "interlude") {
    if (G.stateTime > 0.6) { nextAct(); }
    return;
  }
  if (G.state === "foe") {
    if (G.stateTime > 0.5) { G.state = "battle"; }
    return;
  }
  if (G.state === "lair") {
    if (G.stateTime > 0.6) { beginBattle("dragon"); }
    return;
  }
  if (G.state === "treasure") {
    if (G.stateTime > 0.4) { returnToMap(); }
    return;
  }
  if (G.state === "dead" || G.state === "ending") {
    if (G.stateTime > 0.8) { newRun(); }
    return;
  }
  var z = hitTest(ix, iy);
  if (!z) { return; }
  if (z.t === "node") { enterNode(z.r, z.i); }
  else if (z.t === "card") { playCard(z.i); }
  else if (z.t === "end") { endTurn(); }
  else if (z.t === "reward") { pickReward(z.i); }
  else if (z.t === "skip") { pickReward(-1); }
  else if (z.t === "relic") { pickRelic(z.i); }
  else if (z.t === "opt") { eventChoose(z.i); }
  else if (z.t === "shopopt") { shopChoose(z.i); }
  else if (z.t === "bagopen") { openBag("manage", z.i); }
  else if (z.t === "bagcard") {
    if (G.bag.mode === "upgrade") {
      var cd = cardData(G.deck[z.i]);
      if (cd.lvl < 2 && !cd.curse) { smithUpgrade(z.i); }
    } else {
      G.bag.sel = G.bag.sel === z.i ? -1 : z.i;
    }
  }
  else if (z.t === "bagact") { bagAction(z.i); }
}

document.addEventListener("touchstart", function (e) {
  e.preventDefault();
  if (e.changedTouches.length > 0) {
    pointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}, { passive: false });
["touchmove", "touchend", "touchcancel"].forEach(function (ev) {
  document.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
});
document.addEventListener("mousedown", function (e) { pointerDown(e.clientX, e.clientY); });
document.addEventListener("dblclick", function (e) { e.preventDefault(); });

window.addEventListener("keydown", function (e) {
  initAudio();
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    if (G.state === "title") { G.state = "intro"; G.introIdx = 0; }
    else if (G.state === "intro") {
      G.introIdx++;
      if (G.introIdx >= 2) { G.state = "map"; G.fade = 0.5; }
    }
    else if (G.state === "interlude" && G.stateTime > 0.6) { nextAct(); }
    else if (G.state === "foe" && G.stateTime > 0.5) { G.state = "battle"; }
    else if (G.state === "lair" && G.stateTime > 0.6) { beginBattle("dragon"); }
    else if (G.state === "treasure" && G.stateTime > 0.4) { returnToMap(); }
    else if ((G.state === "dead" || G.state === "ending") && G.stateTime > 0.8) { newRun(); }
    else if (G.state === "battle") { endTurn(); }
  }
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= 6) {
    if (G.state === "battle") { playCard(n - 1); }
    else if (G.state === "reward" && n <= 3) { pickReward(n - 1); }
    else if (G.state === "relic" && n <= 2) { pickRelic(n - 1); }
    else if (G.state === "event" && n <= 4) { eventChoose(n - 1); }
    else if (G.state === "shop" && n <= 6) { shopChoose(n - 1); }
  }
  if (e.key === "0" && G.state === "reward") { pickReward(-1); }
});

// ---------------------------------------------------------------------------
// Обновление
// ---------------------------------------------------------------------------
function update(dt) {
  G.time += dt;
  G.stateTime += dt;
  if (G.shake > 0) { G.shake -= dt; }
  if (G.fade > 0) { G.fade -= dt; }
  if (G.enemyFlash > 0) { G.enemyFlash -= dt; }
  if (G.playerFlash > 0) { G.playerFlash -= dt; }
  if (G.fireFlash > 0) { G.fireFlash -= dt; }
  if (G.enemyLunge > 0) { G.enemyLunge -= dt; }
  if (G.cardFx) {
    G.cardFx.t -= dt;
    if (G.cardFx.t <= 0) { G.cardFx = null; }
  }

  for (var i = G.floaters.length - 1; i >= 0; i--) {
    var f = G.floaters[i];
    f.life -= dt;
    f.y -= 12 * dt;
    if (f.life <= 0) { G.floaters.splice(i, 1); }
  }
  for (i = G.parts.length - 1; i >= 0; i--) {
    var p = G.parts[i];
    p.life -= dt;
    if (p.life <= 0) { G.parts.splice(i, 1); continue; }
    p.vy += 120 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }

  // атмосфера: пыль / споры / угли / искры пустоты (по актам)
  if (G.amb.length < 22 && Math.random() < 0.25) {
    var kind = G.act;
    G.amb.push({
      x: Math.random() * IW,
      y: kind === 1 ? -2 : IH + 2,
      vx: (Math.random() - 0.5) * 4,
      vy: kind === 1 ? 6 + Math.random() * 6 : -(5 + Math.random() * 8),
      life: 3 + Math.random() * 3,
      color: kind === 1 ? PAL.S : kind === 2 ? PAL.L : kind === 3 ? PAL.O : PAL.M
    });
  }
  for (i = G.amb.length - 1; i >= 0; i--) {
    var am = G.amb[i];
    am.life -= dt;
    am.x += am.vx * dt + Math.sin(G.time * 2 + i) * 6 * dt;
    am.y += am.vy * dt;
    if (am.life <= 0 || am.y < -4 || am.y > IH + 4) { G.amb.splice(i, 1); }
  }

  if (G.state === "battle" && G.phase !== "player") {
    G.phaseT -= dt;
    if (G.phaseT <= 0) {
      if (G.phase === "enemyPoison") { enemyPoisonTick(); }
      else if (G.phase === "enemyAct") { enemyAct(); }
      else if (G.phase === "enemyEnd") { startPlayerTurn(); }
      else if (G.phase === "dying") { onVictory(); }
    }
  }
}

// ---------------------------------------------------------------------------
// Отрисовка
// ---------------------------------------------------------------------------
function drawPanel(x, y, w, h, fill) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
}

function drawBar(x, y, w, h, val, max, color) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = PAL.D;
  ctx.fillRect(x, y, w, h);
  var fw = Math.max(0, Math.round(w * val / max));
  ctx.fillStyle = color;
  ctx.fillRect(x, y, fw, h);
}

// декорации по актам: кости и паутина / грибы и сталагмиты /
// лава и черепа / кристаллы и глаза во тьме
var DECOR = {
  1: [["dWeb", 2, 34], ["dWeb", 128, 208], ["dBone", 14, 244], ["dSkull", 118, 242],
      ["dChain", 30, 14], ["dChain", 112, 14], ["dBone", 84, 230]],
  2: [["dShroom", 8, 236], ["dShroom", 126, 230], ["dStal", 20, 246], ["dStal", 100, 246],
      ["dShroom", 62, 244], ["dChain", 70, 14], ["dWeb", 2, 210]],
  3: [["dLava", 10, 246], ["dLava", 90, 240], ["dSkull", 30, 240], ["dBone", 120, 236],
      ["dChain", 24, 14], ["dChain", 118, 14], ["dLava", 50, 250]],
  4: [["dCrystal", 6, 234], ["dCrystal", 128, 228], ["dEyes", 20, 60], ["dEyes", 116, 90],
      ["dCrystal", 66, 240], ["dEyes", 70, 40], ["dSkull", 40, 244]]
};

function drawBackground() {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(0, 0, IW, IH);
  var tint = G.act === 4 ? "#221430" : G.act === 3 ? "#2a1a26" : G.act === 2 ? "#241d30" : "#20233a";
  ctx.fillStyle = tint;
  for (var y = 0; y < IH; y += 10) {
    for (var x = -8; x < IW; x += 16) {
      var off = (y / 10) % 2 ? 8 : 0;
      ctx.fillRect(x + off, y, 14, 8);
    }
  }
  // трещины в кладке
  ctx.fillStyle = PAL.K;
  ctx.fillRect(38, 52, 1, 5); ctx.fillRect(39, 57, 1, 3);
  ctx.fillRect(100, 150, 1, 4); ctx.fillRect(99, 154, 1, 3);
  // декор акта
  var dec = DECOR[G.act] || DECOR[1];
  for (var i = 0; i < dec.length; i++) {
    var d = dec[i];
    if (d[0] === "dEyes") {
      // глаза мигают
      if (Math.floor(G.time * 0.7 + i) % 4 !== 0) { ctx.drawImage(SPR[d[0]], d[1], d[2]); }
    } else if (d[0] === "dShroom" || d[0] === "dCrystal") {
      ctx.save();
      ctx.globalAlpha = 0.7 + Math.sin(G.time * 2 + i * 2) * 0.3;
      ctx.drawImage(SPR[d[0]], d[1], d[2]);
      ctx.restore();
    } else if (d[0] === "dLava") {
      ctx.save();
      ctx.globalAlpha = 0.6 + Math.sin(G.time * 3 + i) * 0.4;
      ctx.drawImage(SPR[d[0]], d[1], d[2]);
      ctx.restore();
    } else {
      ctx.drawImage(SPR[d[0]], d[1], d[2]);
    }
  }
  // факелы
  var fl = Math.floor(G.time * 6) % 2;
  ctx.fillStyle = PAL.B;
  ctx.fillRect(14, 30, 2, 6); ctx.fillRect(IW - 16, 30, 2, 6);
  ctx.fillStyle = fl ? PAL.O : PAL.Y;
  ctx.fillRect(13, 26, 4, 4); ctx.fillRect(IW - 17, 26, 4, 4);
  ctx.fillStyle = fl ? PAL.Y : PAL.O;
  ctx.fillRect(14, 24, 2, 3); ctx.fillRect(IW - 16, 24, 2, 3);
  // атмосферные частицы
  for (i = 0; i < G.amb.length; i++) {
    var a = G.amb[i];
    ctx.save();
    ctx.globalAlpha = Math.min(1, a.life);
    ctx.fillStyle = a.color;
    ctx.fillRect(Math.round(a.x), Math.round(a.y), 1, 1);
    ctx.restore();
  }
}

function drawGold(x, y) {
  ctx.drawImage(SPR.coin, x, y);
  drawText(ctx, String(G.gold), x + 8, y + 1, PAL.Y);
}

function drawCardFace(x, y, w, h, key, dim, zoneType, zoneI, sel) {
  var c = cardData(key);
  var dark = key.indexOf("tma") === 0 || c.curse;
  drawPanel(x, y, w, h, sel ? PAL.C : dark ? PAL.P : c.up ? PAL.O : dim ? PAL.E : PAL.Y);
  ctx.fillStyle = dark ? PAL.P : dim ? PAL.S : PAL.W;
  ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
  var ic = SPR[c.icon];
  ctx.drawImage(ic, x + Math.round((w - 9) / 2), y + 3);
  if (h >= 28) {
    var nameCol = dark ? PAL.W : c.up ? PAL.O : PAL.K;
    drawTextC(ctx, c.name, x + w / 2, y + 14, nameCol);
    var descCol = dark ? PAL.M : dim ? PAL.E : PAL.P;
    drawTextC(ctx, c.desc, x + w / 2, y + 21, descCol);
    if (c.desc2) { drawTextC(ctx, c.desc2, x + w / 2, y + 27, descCol); }
  }
  drawPanel(x - 1, y - 1, 7, 7, dim ? PAL.E : PAL.B);
  drawText(ctx, c.curse ? "-" : String(c.cost), x + 1, y, PAL.W);
  if (c.lvl >= 1) {
    ctx.fillStyle = PAL.Y;
    ctx.fillRect(x + w - 4, y - 1, 3, 3);
    if (c.lvl >= 2) { ctx.fillRect(x + w - 8, y - 1, 3, 3); }
  }
  if (zoneType) {
    G.zones.push({ t: zoneType, i: zoneI, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
  }
}

function drawBagButton(retState) {
  var x = 4, y = IH - 16;
  drawPanel(x, y, 42, 13, PAL.N);
  ctx.drawImage(SPR.bag, x + 2, y + 2);
  drawText(ctx, "СУМКА", x + 13, y + 4, PAL.W);
  G.zones.push({ t: "bagopen", i: retState, x: x - 2, y: y - 2, w: 46, h: 17 });
}

// --- карта акта ---
var NODE_ICON = {
  fight: "nFight", elite: "nElite", event: "nEvent", fire: "nFire",
  shop: "nShop", treasure: "nChest", boss: "nBoss", dragon: "nDragon"
};

function drawMap() {
  drawTextC(ctx, "АКТ " + G.act + "/" + ACTS, IW / 2, 8, PAL.Y, 2);
  drawGold(4, 4);
  ctx.drawImage(SPR.heart, IW - 42, 16);
  drawText(ctx, G.hp + "/" + G.maxHp, IW - 33, 17, PAL.W);
  for (var ri = 0; ri < G.relics.length; ri++) {
    ctx.drawImage(SPR[RELIC_DEFS[G.relics[ri]].icon], 4 + ri * 11, 16);
  }

  var y0 = 40, dy = 25;
  // рёбра
  for (var r = 0; r < ROWS - 1; r++) {
    for (var i = 0; i < G.mapRows[r].length; i++) {
      var a = G.mapRows[r][i];
      for (var e = 0; e < a.edges.length; e++) {
        var b = G.mapRows[r + 1][a.edges[e]];
        var x1 = a.x, yy1 = y0 + r * dy + 6, x2 = b.x, yy2 = y0 + (r + 1) * dy - 6;
        var steps = 6;
        var lit = a.done && (G.pos.r === r ? true : false);
        ctx.fillStyle = lit ? PAL.S : PAL.D;
        for (var s2 = 0; s2 <= steps; s2++) {
          var px = Math.round(x1 + (x2 - x1) * s2 / steps);
          var py2 = Math.round(yy1 + (yy2 - yy1) * s2 / steps);
          ctx.fillRect(px, py2, 1, 1);
        }
      }
    }
  }
  // узлы
  for (r = 0; r < ROWS; r++) {
    for (i = 0; i < G.mapRows[r].length; i++) {
      var nd = G.mapRows[r][i];
      var nx = nd.x - 6, ny = y0 + r * dy - 6;
      var reachable = false;
      if (G.pos.r === -1) { reachable = r === 0; }
      else if (r === G.pos.r + 1) {
        reachable = G.mapRows[G.pos.r][G.pos.i].edges.indexOf(i) >= 0;
      }
      var here = G.pos.r === r && G.pos.i === i;
      // подложка
      if (here) {
        drawPanel(nx - 2, ny - 2, 16, 16, PAL.N);
      } else if (reachable && Math.floor(G.time * 2) % 2 === 0) {
        drawPanel(nx - 2, ny - 2, 16, 16, PAL.T);
      }
      ctx.save();
      if (!reachable && !here && !nd.done) { ctx.globalAlpha = 0.55; }
      if (nd.done && !here) { ctx.globalAlpha = 0.3; }
      ctx.drawImage(SPR[NODE_ICON[nd.type]], nx + 1, ny + 1);
      ctx.restore();
      if (reachable) {
        G.zones.push({ t: "node", r: r, i: i, x: nx - 4, y: ny - 4, w: 20, h: 20 });
      }
    }
  }
  // рыцарь-фишка
  if (G.pos.r >= 0) {
    var cur = G.mapRows[G.pos.r][G.pos.i];
    ctx.drawImage(SPR.knight, cur.x + 8, y0 + G.pos.r * dy - 12, 10, 14);
  }

  drawTextC(ctx, "ВЫБЕРИ ПУТЬ", IW / 2, y0 + ROWS * dy + 2, PAL.C);
  // легенда
  var ly = y0 + ROWS * dy + 14;
  ctx.drawImage(SPR.nFight, 8, ly); drawText(ctx, "БОЙ", 20, ly + 2, PAL.S);
  ctx.drawImage(SPR.nElite, 40, ly); drawText(ctx, "ЭЛИТА", 52, ly + 2, PAL.S);
  ctx.drawImage(SPR.nEvent, 84, ly); drawText(ctx, "СОБЫТИЕ", 96, ly + 2, PAL.S);
  var ly2 = ly + 12;
  ctx.drawImage(SPR.nFire, 8, ly2); drawText(ctx, "КОСТЁР", 20, ly2 + 2, PAL.S);
  ctx.drawImage(SPR.nShop, 62, ly2); drawText(ctx, "ЛАВКА", 74, ly2 + 2, PAL.S);
  ctx.drawImage(SPR.nChest, 106, ly2); drawText(ctx, "КЛАД", 118, ly2 + 2, PAL.S);

  drawBagButton("map");
}

function drawBattle() {
  var shx = G.shake > 0 ? Math.round((Math.random() - 0.5) * 4) : 0;
  ctx.save();
  ctx.translate(shx, 0);

  var e = G.enemy;
  var isBig = e.def.boss || e.def.mini || e.elite;

  var sp = SPR[e.def.key];
  var esc = 3;
  var ew = sp.width * esc, eh = sp.height * esc;
  var ex = Math.round((IW - ew) / 2);
  var lunge = G.enemyLunge > 0 ? Math.round(G.enemyLunge * 14) : 0;
  var ey = 60 - eh + Math.round(Math.sin(G.time * 2.5) * 2) + lunge;

  if (G.enemyFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.save();
    ctx.filter = "brightness(3)";
    ctx.drawImage(sp, ex, ey, ew, eh);
    ctx.restore();
  } else {
    ctx.drawImage(sp, ex, ey, ew, eh);
  }
  if (e.def.boss && e.enraged) {
    ctx.fillStyle = Math.floor(G.time * 8) % 2 ? PAL.O : PAL.R;
    ctx.fillRect(ex - 3, ey + 6, 2, 2);
    ctx.fillRect(ex + ew + 1, ey + 6, 2, 2);

  var floorTxt = "АКТ " + G.act + "  ЭТАЖ " + floorNum() + "/" + (ACTS * ROWS);
  drawPanel(2, 2, textW(floorTxt) + 5, 9, PAL.K);
  drawText(ctx, floorTxt, 4, 4, isBig ? PAL.R : PAL.W);
  drawPanel(IW - 34, 2, 32, 9, PAL.K);
  drawGold(IW - 32, 3);
  for (var i = 0; i < G.relics.length; i++) {
    ctx.drawImage(SPR[RELIC_DEFS[G.relics[i]].icon], IW - 12 - i * 11, 13);
  }

  var showIntent = (G.phase === "player" || G.phase === "enemyPoison") && G.hp > 0;
  if (showIntent) {
    var ixx = 6, iyy = 20;
    var lbl = "", icn = null, col = PAL.W;
    if (e.stun > 0) { icn = SPR.mStun; lbl = "СТАН"; col = PAL.Y; }
    else {
      var it = intent();
      if (it === "a") { icn = SPR.mSword; lbl = String(e.atk); col = PAL.R; }
      else if (it === "v") { icn = SPR.mDrain; lbl = e.atk + "+ХИЛ"; col = PAL.R; }
      else if (it === "f") { icn = SPR.mFire; lbl = e.fire + "!"; col = PAL.O; }
      else if (it === "s") { icn = SPR.mWeb; lbl = "СЕТЬ"; col = PAL.Y; }
      else if (it === "h") { icn = SPR.mHeal; lbl = "ХИЛ"; col = PAL.L; }
      else { icn = SPR.mShield; lbl = "ЩИТ"; col = PAL.A; }
    }
    drawPanel(ixx - 3, iyy - 3, textW(lbl) + 16, 13, PAL.K);
    ctx.drawImage(icn, ixx, iyy);
    drawText(ctx, lbl, ixx + 9, iyy + 1, col);
  }

  drawTextC(ctx, e.name, IW / 2, 64, isBig ? PAL.Y : PAL.W);
  drawBar(IW / 2 - 30, 71, 60, 4, e.hp, e.maxHp, PAL.R);
  drawTextC(ctx, e.hp + "/" + e.maxHp, IW / 2, 77, PAL.W);
  if (e.block > 0) {
    ctx.drawImage(SPR.mShield, IW / 2 + 34, 69);
    drawText(ctx, String(e.block), IW / 2 + 42, 70, PAL.A);
  }
  if (e.poison > 0) {
    ctx.drawImage(SPR.mSkull, IW / 2 - 52, 69);
    drawText(ctx, String(e.poison), IW / 2 - 44, 70, PAL.G);
  }
  if (e.burn > 0) {
    ctx.drawImage(SPR.mFire, IW / 2 - 68, 69);
    drawText(ctx, String(e.burn), IW / 2 - 60, 70, PAL.O);
  }

  var py = 92;
  if (G.playerFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.fillStyle = G.fireFlash > 0 ? "rgba(239,125,87,0.4)" : "rgba(177,62,83,0.35)";
    ctx.fillRect(0, py - 4, IW, 32);
  }
  ctx.drawImage(SPR.heart, 6, py);
  drawBar(16, py + 1, 62, 5, G.hp, G.maxHp, PAL.L);
  drawText(ctx, G.hp + "/" + G.maxHp, 82, py, PAL.W);
  if (G.playerStun) { ctx.drawImage(SPR.mWeb, 120, py - 1); }
  var me = maxEnergy();
  for (i = 0; i < me; i++) {
    if (i < G.energy) {
      ctx.drawImage(SPR.bolt, 8 + i * 8, py + 10);
    } else {
      ctx.fillStyle = PAL.D;
      ctx.fillRect(9 + i * 8, py + 11, 3, 5);
    }
  }
  drawText(ctx, "ЭНЕРГИЯ", 8 + me * 8 + 4, py + 11, PAL.S);
  if (G.block > 0) {
    ctx.drawImage(SPR.mShield, 112, py + 10);
    drawText(ctx, String(G.block), 121, py + 11, PAL.A);
  }

  var hy = 126, n = G.hand.length;
  var cw = n > 5 ? 22 : 26, gap = n > 5 ? 1 : 2, chh = 34;
  var total = n * (cw + gap) - gap;
  var hx0 = Math.round((IW - total) / 2);
  drawText(ctx, "РУКА", 4, hy - 8, PAL.E);
  var pileTxt = G.drawPile.length + "/" + G.discard.length;
  drawText(ctx, pileTxt, IW - textW(pileTxt) - 4, hy - 8, PAL.E);
  for (i = 0; i < n; i++) {
    var key = G.hand[i];
    var cd2 = cardData(key);
    var dim = cd2.curse || cd2.cost > G.energy || G.phase !== "player";
    drawCardFace(hx0 + i * (cw + gap), hy, cw, chh, key, dim, "card", i, false);
  }
  if (n === 0 && G.phase === "player") {
    drawTextC(ctx, "НЕТ КАРТ", IW / 2, hy + 14, PAL.E);
  }

  // улетающая карта
  if (G.cardFx) {
    ctx.save();
    ctx.globalAlpha = G.cardFx.t / 0.3;
    var fy = G.cardFx.y - (0.3 - G.cardFx.t) * 90;
    drawCardFace(G.cardFx.x, Math.round(fy), 22, 30, G.cardFx.key, false, null, 0, false);
    ctx.restore();
  }

  var by = 170, bw = 64, bh = 14;
  var bx = Math.round((IW - bw) / 2);
  var active = G.phase === "player";
  drawPanel(bx, by, bw, bh, active ? PAL.R : PAL.D);
  drawTextC(ctx, "КОНЕЦ ХОДА", bx + bw / 2, by + 5, active ? PAL.W : PAL.E);
  if (active) { G.zones.push({ t: "end", i: 0, x: bx - 2, y: by - 2, w: bw + 4, h: bh + 4 }); }

  if (floorNum() === 1 && G.time < 12) {
    drawLines(["ТАП ПО КАРТЕ = СЫГРАТЬ",
               "ЗНАЧОК СЛЕВА = ХОД ВРАГА",
               "ЩИТ СГОРАЕТ КАЖДЫЙ ХОД"], 192, 8, PAL.S);
  }
  if (e.def.boss) {
    drawTextC(ctx, e.enraged ? "ЯРОСТЬ: ТОЛЬКО ОГОНЬ И КЛЫКИ!" : "ПЛАМЯ БЬЁТ СКВОЗЬ ЩИТ!", IW / 2, 192, PAL.O);
  }

  ctx.restore();
}

               "ЕЁ ГОЛОС: ПОМОГИТЕ!"], 158, 10, PAL.M);
  } else {
    ctx.drawImage(SPR.knight, Math.round(IW / 2 - 15), 28, 30, 42);
    drawLines(["ТЫ - РЫЦАРЬ С КОЛОДОЙ КАРТ.",
               "",
               "ПОДЗЕМЕЛЬЕ - ЭТО КАРТА ПУТЕЙ.",
               "САМ ВЫБИРАЙ ДОРОГУ:",
               "БОИ, СОБЫТИЯ, КЛАДЫ, ЛАВКИ.",
               "",
               "ЭЛИТНЫЕ ВРАГИ ОПАСНЕЙ,",
               "НО ДАЮТ КАРТЫ+.",
               "",
               "ДУБЛИ ОБЪЕДИНЯЙ В СУМКЕ.",
               "ВНИЗУ КАЖДОГО ЯРУСА - СТРАЖ."], 82, 9, PAL.W);
  }
  if (Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ДАЛЬШЕ", IW / 2, 224, PAL.C);
  }
}

function drawEnding() {
  var t = G.stateTime;
  var sp = SPR.dragon;
  var dy = Math.min(1, t / 1.5);
  ctx.save();
  ctx.globalAlpha = 1 - dy * 0.7;
  ctx.drawImage(sp, Math.round((IW - sp.width * 2) / 2), 30 + dy * 20, sp.width * 2, sp.height * 2);
  ctx.restore();

  ctx.drawImage(SPR.knight, IW / 2 - 32, 90, 20, 28);
  ctx.drawImage(SPR.princess, IW / 2 + 12, 90, 20, 28);
  if (t > 1) {
    var hb = Math.floor(G.time * 3) % 2;
    ctx.drawImage(SPR.heart, IW / 2 - 4, 84 - (hb ? 2 : 0));
  }

  drawTextC(ctx, "ДРАКОН ПОВЕРЖЕН!", IW / 2, 134, PAL.Y, 2);
  drawTextC(ctx, "ПРИНЦЕССА СПАСЕНА!", IW / 2, 152, PAL.M);
  drawLines(["РЫЦАРЬ И ПРИНЦЕССА",
             "ПОДНИМАЮТСЯ К СОЛНЦУ.",
             "КОНЕЦ."], 168, 9, PAL.W);
  drawTextC(ctx, "РЕЛИКВИЙ СОБРАНО: " + G.relics.length, IW / 2, 198, PAL.S);
  drawTextC(ctx, "ВСЕГО СПАСЕНИЙ: " + wins, IW / 2, 208, PAL.L);
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = В НАЧАЛО", IW / 2, 224, PAL.C);
  }
}

function drawDead() {
  ctx.fillStyle = "rgba(26,28,44,0.8)";
  ctx.fillRect(0, 0, IW, IH);
  drawTextC(ctx, "ТЫ ПАЛ", IW / 2, 70, PAL.R, 2);
  drawTextC(ctx, "ЭТАЖ " + floorNum() + " ИЗ " + ACTS * ROWS, IW / 2, 96, PAL.W);
  drawTextC(ctx, "ПРИНЦЕССА ВСЁ ЕЩЁ ЖДЁТ...", IW / 2, 110, PAL.M);
  if (floorNum() >= best && best > 0) {
    drawTextC(ctx, "НОВЫЙ РЕКОРД!", IW / 2, 124, PAL.Y);
  }
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ЗАНОВО", IW / 2, 150, PAL.C);
  }
}

function draw() {
  G.zones = [];
  drawBackground();
  if (G.state === "title") { drawTitle(); }
  else if (G.state === "intro") { drawIntro(); }
  else if (G.state === "map") { drawMap(); }
  else if (G.state === "battle") { drawBattle(); }
  else if (G.state === "reward") { drawReward(); }
  else if (G.state === "relic") { drawRelicChoice(); }
  else if (G.state === "event") { drawEvent(); }
  else if (G.state === "shop") { drawShop(); }
  else if (G.state === "treasure") { drawTreasure(); }
  else if (G.state === "interlude") { drawInterlude(); }
  else if (G.state === "foe") { drawFoe(); }
  else if (G.state === "lair") { drawLair(); }
  else if (G.state === "bag") { drawBagScreen(); }
  else if (G.state === "ending") { drawEnding(); }
  else if (G.state === "dead") { drawBattle(); drawDead(); }

  for (var i = 0; i < G.parts.length; i++) {
    var p = G.parts[i];
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 1, 1);
  }
  for (i = 0; i < G.floaters.length; i++) {
    var f = G.floaters[i];
    drawTextC(ctx, f.text, f.x, Math.round(f.y), f.color);
  }
  if (G.fade > 0) {
    ctx.fillStyle = "rgba(26,28,44," + Math.min(1, G.fade * 2.2) + ")";
    ctx.fillRect(0, 0, IW, IH);
  }
}

function drawBagScreen() {
  var b = G.bag;
  drawTextC(ctx, b.mode === "upgrade" ? "ВЫБЕРИ КАРТУ ДЛЯ КУЗНЕЦА" : "СУМКА", IW / 2, 8, PAL.Y,
            b.mode === "upgrade" ? 1 : 2);
  var dc = "КОЛОДА " + G.deck.length + "/" + DECK_MAX;
  drawTextC(ctx, dc, IW / 2, b.mode === "upgrade" ? 18 : 24, PAL.S);
  drawGold(4, 4);

  var cw = 21, chh = 26, gap = 2;
  var perRow = 6;
  var x0 = Math.round((IW - (perRow * (cw + gap) - gap)) / 2);
  var y0 = 34;
  for (var i = 0; i < G.deck.length; i++) {
    var col = i % perRow, row = Math.floor(i / perRow);
    var x = x0 + col * (cw + gap), y = y0 + row * (chh + 4);
    var c = cardData(G.deck[i]);
    var dimIt = b.mode === "upgrade" && (c.lvl >= 2 || c.curse);
    drawCardFace(x, y, cw, chh, G.deck[i], dimIt, "bagcard", i, b.sel === i);
  }

  var py = 34 + Math.ceil(DECK_MAX / perRow) * 30 + 6;
  if (b.mode !== "upgrade" && b.sel >= 0 && b.sel < G.deck.length) {
    var sc2 = cardData(G.deck[b.sel]);
    drawPanel(8, py, IW - 16, 24, PAL.N);
    drawText(ctx, sc2.name, 14, py + 4, sc2.up ? PAL.O : PAL.W);
    var dsc = sc2.desc + (sc2.desc2 ? "  " + sc2.desc2 : "") + "  ЦЕНА " + sc2.cost;
    drawText(ctx, dsc, 14, py + 13, PAL.S);

    var canMerge = bagDuplicateIdx(b.sel) >= 0;
    var byy = py + 30;
    drawPanel(8, byy, 62, 14, canMerge ? PAL.G : PAL.D);
    drawTextC(ctx, "ОБЪЕДИНИТЬ", 8 + 31, byy + 5, canMerge ? PAL.K : PAL.E);
    if (canMerge) { G.zones.push({ t: "bagact", i: "merge", x: 6, y: byy - 2, w: 66, h: 18 }); }
    var canDrop = G.deck.length > 6 || cardData(G.deck[b.sel]).curse;
    drawPanel(76, byy, 62, 14, canDrop ? PAL.R : PAL.D);
    drawTextC(ctx, "ВЫБРОСИТЬ", 76 + 31, byy + 5, canDrop ? PAL.W : PAL.E);
    G.zones.push({ t: "bagact", i: "drop", x: 74, y: byy - 2, w: 66, h: 18 });
  } else if (b.mode !== "upgrade") {
    drawTextC(ctx, "ТАП ПО КАРТЕ = ВЫБРАТЬ", IW / 2, py + 6, PAL.E);
    drawTextC(ctx, "2 ОДИНАКОВЫЕ = УЛУЧШЕННАЯ", IW / 2, py + 16, PAL.E);
  } else {
    drawTextC(ctx, "УЛУЧШЕННЫЕ И ПРОКЛЯТЫЕ", IW / 2, py + 6, PAL.E);
    drawTextC(ctx, "КАРТЫ ВЫБРАТЬ НЕЛЬЗЯ", IW / 2, py + 16, PAL.E);
  }

  var bky = IH - 20;
  drawPanel(Math.round((IW - 60) / 2), bky, 60, 14, PAL.B);
  drawTextC(ctx, "НАЗАД", IW / 2, bky + 5, PAL.W);
  G.zones.push({ t: "bagact", i: "back", x: (IW - 60) / 2 - 2, y: bky - 2, w: 64, h: 18 });
}

var lastT = performance.now();
function frame(now) {
  var dt = Math.max(0, Math.min(0.033, (now - lastT) / 1000));
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
