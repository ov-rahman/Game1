function glyph(ch) { return FONT[ch] || FONT["?"]; }
function drawText(c, text, x, y, color, sc) {
  sc = sc || 1;
  c.fillStyle = color;
  var cx = x;
  for (var i = 0; i < text.length; i++) {
    var g = glyph(text[i]);
    var w = g[0].length;
    for (var ry = 0; ry < 5; ry++) {
      for (var rx = 0; rx < w; rx++) {
        if (g[ry][rx] === "1") {
          c.fillRect(cx + rx * sc, y + ry * sc, sc, sc);
        }
      }
    }
    cx += (w + 1) * sc;
  }
}
function textW(text, sc) {
  sc = sc || 1;
  var w = 0;
  for (var i = 0; i < text.length; i++) { w += glyph(text[i])[0].length + 1; }
  return (w - 1) * sc;
}
function drawTextC(c, text, cx, y, color, sc) {
  drawText(c, text, Math.round(cx - textW(text, sc) / 2), y, color, sc);
}
function drawLines(lines, y, dy, color, sc) {
  for (var i = 0; i < lines.length; i++) {
    drawTextC(ctx, lines[i], IW / 2, y + i * dy, color, sc);
  }
}

// ---------------------------------------------------------------------------
// Спрайты

function makeSprite(rows) {
  var h = rows.length, w = 0, y, x;
  for (y = 0; y < h; y++) { w = Math.max(w, rows[y].length); }
  var cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  var c = cv.getContext("2d");
  for (y = 0; y < h; y++) {
    for (x = 0; x < rows[y].length; x++) {
      var ch = rows[y][x];
      if (ch !== ".") {
        c.fillStyle = PAL[ch] || "#f0f";
        c.fillRect(x, y, 1, 1);
      }
    }
  }
  return cv;
}

function hasRelic(k) { return G.relics.indexOf(k) >= 0; }

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") { audioCtx.resume(); }
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx || audioCtx.state !== "running") { return; }
  var t = audioCtx.currentTime;
  var o = audioCtx.createOscillator();
  var gn = audioCtx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, t);
  if (slide) { o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur); }
  gn.gain.setValueAtTime(vol || 0.12, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(gn); gn.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}
var sfx = {
  card:   function () { beep(500, 0.06, "triangle", 0.12, 200); },
  hit:    function () { beep(150, 0.15, "sawtooth", 0.15, -60); },
  block:  function () { beep(300, 0.1, "square", 0.1, -80); },
  heal:   function () { beep(660, 0.12, "sine", 0.12, 220); },
  poison: function () { beep(220, 0.15, "triangle", 0.1, -120); },
  hurt:   function () { beep(120, 0.25, "sawtooth", 0.16, -60); },
  fire:   function () { beep(100, 0.4, "sawtooth", 0.16, 60); },
  stun:   function () { beep(700, 0.2, "square", 0.1, -400); },
  win:    function () { [523, 659, 784].forEach(function (f, i) { setTimeout(function () { beep(f, 0.15, "square", 0.1); }, i * 110); }); },
  boss:   function () { beep(90, 0.5, "sawtooth", 0.14, -30); },
  dead:   function () { [330, 262, 196, 131].forEach(function (f, i) { setTimeout(function () { beep(f, 0.22, "square", 0.1); }, i * 180); }); },
  pick:   function () { beep(880, 0.1, "square", 0.1, 200); },
  finale: function () { [523, 659, 784, 1047, 784, 1047].forEach(function (f, i) { setTimeout(function () { beep(f, 0.2, "square", 0.1); }, i * 150); }); }
};

// ---------------------------------------------------------------------------
// Состояние
// ---------------------------------------------------------------------------
var G = null;
var best = 0, wins = 0;
try {
  best = parseInt(localStorage.getItem("ddBest") || "0", 10) || 0;
  wins = parseInt(localStorage.getItem("ddWins") || "0", 10) || 0;
} catch (e) {}
function save() {
  try {
    localStorage.setItem("ddBest", String(best));
    localStorage.setItem("ddWins", String(wins));
  } catch (e) {}
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function newRun() {
  var minis = shuffle(MINIBOSSES.slice());
  G = {
    state: "title",  // title | intro | battle | reward | relic | ending | dead
    introIdx: 0,
    time: 0, stateTime: 0,
    floor: 0,
    hp: 32, maxHp: 32,
    block: 0,
    energy: 3, baseEnergy: 3,
    deck: ["udar", "udar", "udar", "udar", "udar",
           "blok", "blok", "blok", "blok", "zelye"],
    drawPile: [], discard: [], hand: [],
    relics: [],
    relicChoice: [],
    minis: [minis[0], minis[1]], // стражи этого забега
    voice: "",
    enemy: null,
    phase: "player", phaseT: 0,
    floaters: [], shake: 0,
    enemyFlash: 0, playerFlash: 0, fireFlash: 0,
    rewards: [],
    zones: []
  };
}
newRun();

function maxEnergy() { return G.baseEnergy + (hasRelic("kristall") ? 1 : 0); }

function monsterFor(floor) {
  if (floor === FLOORS) { return DRAGON; }
  if (floor === 5) { return G.minis[0]; }
  if (floor === 10) { return G.minis[1]; }
  var pool = floor < 5 ? TIER1 : floor < 10 ? TIER2 : TIER3;
  return pool[Math.floor(Math.random() * pool.length)];
}

function startBattle() {
  G.floor++;
  var def = monsterFor(G.floor);
  var lvl = G.floor - 1;
  var scale = def.boss ? 0 : def.mini ? lvl : lvl * 2;
  G.enemy = {
    def: def,
    name: def.name,
    hp: def.hp + scale,
    maxHp: def.hp + scale,
    atk: def.atk + (def.boss || def.mini ? 0 : Math.floor(lvl / 3)),
    block: 0, poison: 0, stun: 0,
    step: 0
  };
  G.state = "battle";
  G.phase = "player";
  G.block = 0;
  G.drawPile = shuffle(G.deck.slice());
  G.discard = [];
  G.hand = [];
  drawCards(5);
  G.energy = maxEnergy();
  if (def.boss || def.mini) { sfx.boss(); }
}

function drawCards(n) {
  for (var i = 0; i < n; i++) {
    if (G.hand.length >= 5) { return; }
    if (G.drawPile.length === 0) {
      if (G.discard.length === 0) { return; }
      G.drawPile = shuffle(G.discard);
      G.discard = [];
    }
    G.hand.push(G.drawPile.pop());
  }
}

function intent() {
  var e = G.enemy;
  return e.def.pattern[e.step % e.def.pattern.length];
}

function addFloater(x, y, text, color) {
  G.floaters.push({ x: x, y: y, text: text, color: color, life: 0.9 });
}

function afterEnemyDead() {
  G.phase = "dying";
  G.phaseT = 0.7;
  sfx.win();
}

function damageEnemy(n, silent) {
  var e = G.enemy;
  var absorbed = Math.min(e.block, n);
  e.block -= absorbed;
  var dealt = n - absorbed;
  e.hp -= dealt;
  G.enemyFlash = 0.18;
  if (!silent) { sfx.hit(); }
  addFloater(IW / 2 + 22, 52, "-" + dealt, dealt > 0 ? PAL.Y : PAL.S);
  if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); }
}

function playCard(idx) {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  var key = G.hand[idx];
  if (!key) { return; }
  var c = CARD_DEFS[key];
  if (c.cost > G.energy) {
    addFloater(IW / 2, 150, "НЕТ ЭНЕРГИИ", PAL.R);
    return;
  }
  G.energy -= c.cost;
  G.hand.splice(idx, 1);
  G.discard.push(key);
  sfx.card();
  if (c.dmg) {
    damageEnemy(c.dmg + (hasRelic("tochilo") ? 2 : 0));
  }
  if (c.block) {
    var b = c.block + (hasRelic("pancir") ? 2 : 0);
    G.block += b;
    addFloater(IW / 2 - 30, 120, "+" + b, PAL.A);
    sfx.block();
  }
  if (c.heal) {
    var h = Math.min(c.heal, G.maxHp - G.hp);
    G.hp += h;
    addFloater(IW / 2 - 30, 112, "+" + h, PAL.L);
    sfx.heal();
  }
  if (c.poison && G.enemy.hp > 0) {
    var p = c.poison + (hasRelic("amulet") ? 2 : 0);
    G.enemy.poison += p;
    addFloater(IW / 2 + 22, 44, "ЯД +" + p, PAL.G);
    sfx.poison();
  }
  if (c.stun && G.enemy.hp > 0) {
    G.enemy.stun += c.stun;
    addFloater(IW / 2 + 22, 44, "СТАН", PAL.Y);
    sfx.stun();
  }
  if (c.draw) { drawCards(c.draw); }
}

function endTurn() {
  if (G.state !== "battle" || G.phase !== "player") { return; }
  G.discard = G.discard.concat(G.hand);
  G.hand = [];
  G.phase = "enemyPoison";
  G.phaseT = 0.45;
}

function enemyPoisonTick() {
  var e = G.enemy;
  if (e.poison > 0) {
    e.hp -= e.poison;
    addFloater(IW / 2 + 22, 52, "-" + e.poison, PAL.G);
    G.enemyFlash = 0.18;
    sfx.poison();
    e.poison--;
    if (e.hp <= 0) { e.hp = 0; afterEnemyDead(); return; }
  }
  G.phase = "enemyAct";
  G.phaseT = 0.5;
}

function hurtPlayer(dealt) {
  G.hp -= dealt;
  if (G.hp <= 0) {
    G.hp = 0;
    G.state = "dead";
    G.stateTime = 0;
    if (G.floor > best) { best = G.floor; save(); }
    sfx.dead();
    return true;
  }
  return false;
}

function enemyAct() {
  var e = G.enemy;
  if (e.stun > 0) {
    e.stun--;
    addFloater(IW / 2 + 22, 52, "СТАН!", PAL.Y);
    sfx.stun();
    G.phase = "enemyEnd";
    G.phaseT = 0.4;
    return;
  }
  var act = intent();
  e.step++;
  if (act === "a") {
    var dmg = e.atk;
    var absorbed = Math.min(G.block, dmg);
    G.block -= absorbed;
    var dealt = dmg - absorbed;
    G.playerFlash = 0.25;
    G.shake = 0.25;
    addFloater(IW / 2 - 30, 112, "-" + dealt, dealt > 0 ? PAL.R : PAL.S);
    if (dealt > 0) { sfx.hurt(); } else { sfx.block(); }
    if (hurtPlayer(dealt)) { return; }
  } else if (act === "f") {
    // пламя дракона — сквозь щит
    var fd = e.def.fire || e.atk;
    G.playerFlash = 0.3;
    G.fireFlash = 0.4;
    G.shake = 0.3;
    addFloater(IW / 2 - 30, 112, "-" + fd + " ОГОНЬ", PAL.O);
    sfx.fire();
    if (hurtPlayer(fd)) { return; }
  } else if (act === "h") {
    var hh = Math.min(e.def.heal || 8, e.maxHp - e.hp);
    e.hp += hh;
    addFloater(IW / 2 + 22, 52, "+" + hh, PAL.L);
    sfx.heal();
  } else {
    var eb = 5 + (e.def.defBonus || 0) + Math.floor(G.floor / 3);
    e.block += eb;
    addFloater(IW / 2 + 22, 52, "ЩИТ +" + eb, PAL.A);
    sfx.block();
  }
  G.phase = "enemyEnd";
  G.phaseT = 0.4;
}

function startPlayerTurn() {
  G.block = 0;
  G.energy = maxEnergy();
  drawCards(5);
  G.phase = "player";
}

function onVictory() {
  if (hasRelic("flyaga")) {
    G.hp = Math.min(G.maxHp, G.hp + 5);
  }
  if (G.floor === FLOORS) {
    // дракон повержен!
    G.state = "ending";
    G.stateTime = 0;
    wins++;
    if (G.floor > best) { best = G.floor; }
    save();
    sfx.finale();
  } else if (G.enemy.def.mini) {
    // страж: выбор из 2 случайных реликвий + лечение
    G.hp = Math.min(G.maxHp, G.hp + 10);
    var pool = [];
    for (var k in RELIC_DEFS) { if (!hasRelic(k)) { pool.push(k); } }
    shuffle(pool);
    G.relicChoice = pool.slice(0, 2);
    G.voice = VOICES[Math.floor(Math.random() * VOICES.length)];
    G.state = "relic";
  } else {
    var rp = shuffle(REWARD_POOL.slice());
    G.rewards = rp.slice(0, 3);
    G.state = "reward";
  }
}

function pickReward(i) {
  if (i >= 0) {
    G.deck.push(G.rewards[i]);
    sfx.pick();
  } else {
    G.hp = Math.min(G.maxHp, G.hp + 6);
    sfx.heal();
  }
  startBattle();
}

function pickRelic(i) {
  var k = G.relicChoice[i];
  if (!k) { return; }
  G.relics.push(k);
  if (k === "serdce") { G.maxHp += 12; G.hp += 12; }
  sfx.pick();
  startBattle();
}

// ---------------------------------------------------------------------------
// Ввод
// ---------------------------------------------------------------------------
function hitTest(ix, iy) {
  for (var i = G.zones.length - 1; i >= 0; i--) {
    var z = G.zones[i];
    if (ix >= z.x && ix < z.x + z.w && iy >= z.y && iy < z.y + z.h) { return z; }
  }
  return null;
}

function pointerDown(clientX, clientY) {
  initAudio();
  var r = canvas.getBoundingClientRect();
  var ix = (clientX - r.left) / r.width * IW;
  var iy = (clientY - r.top) / r.height * IH;

  if (G.state === "title") { G.state = "intro"; G.introIdx = 0; return; }
  if (G.state === "intro") {
    G.introIdx++;
    if (G.introIdx >= 2) { startBattle(); }
    return;
  }
  if (G.state === "dead" || G.state === "ending") {
    if (G.stateTime > 0.8) { newRun(); }
    return;
  }
  var z = hitTest(ix, iy);
  if (!z) { return; }
  if (z.t === "card") { playCard(z.i); }
  else if (z.t === "end") { endTurn(); }
  else if (z.t === "reward") { pickReward(z.i); }
  else if (z.t === "skip") { pickReward(-1); }
  else if (z.t === "relic") { pickRelic(z.i); }
}

document.addEventListener("touchstart", function (e) {
  e.preventDefault();
  if (e.changedTouches.length > 0) {
    pointerDown(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
}, { passive: false });
["touchmove", "touchend", "touchcancel"].forEach(function (ev) {
  document.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
});
document.addEventListener("mousedown", function (e) { pointerDown(e.clientX, e.clientY); });
document.addEventListener("dblclick", function (e) { e.preventDefault(); });

window.addEventListener("keydown", function (e) {
  initAudio();
  if (e.code === "Space" || e.code === "Enter") {
    e.preventDefault();
    if (G.state === "title") { G.state = "intro"; G.introIdx = 0; }
    else if (G.state === "intro") {
      G.introIdx++;
      if (G.introIdx >= 2) { startBattle(); }
    }
    else if ((G.state === "dead" || G.state === "ending") && G.stateTime > 0.8) { newRun(); }
    else if (G.state === "battle") { endTurn(); }
  }
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= 5) {
    if (G.state === "battle") { playCard(n - 1); }
    else if (G.state === "reward" && n <= 3) { pickReward(n - 1); }
    else if (G.state === "relic" && n <= 2) { pickRelic(n - 1); }
  }
  if (e.key === "0" && G.state === "reward") { pickReward(-1); }
});

// ---------------------------------------------------------------------------
// Обновление
// ---------------------------------------------------------------------------
function update(dt) {
  G.time += dt;
  G.stateTime += dt;
  if (G.shake > 0) { G.shake -= dt; }
  if (G.enemyFlash > 0) { G.enemyFlash -= dt; }
  if (G.playerFlash > 0) { G.playerFlash -= dt; }
  if (G.fireFlash > 0) { G.fireFlash -= dt; }

  for (var i = G.floaters.length - 1; i >= 0; i--) {
    var f = G.floaters[i];
    f.life -= dt;
    f.y -= 12 * dt;
    if (f.life <= 0) { G.floaters.splice(i, 1); }
  }

  if (G.state === "battle" && G.phase !== "player") {
    G.phaseT -= dt;
    if (G.phaseT <= 0) {
      if (G.phase === "enemyPoison") { enemyPoisonTick(); }
      else if (G.phase === "enemyAct") { enemyAct(); }
      else if (G.phase === "enemyEnd") { startPlayerTurn(); }
      else if (G.phase === "dying") { onVictory(); }
    }
  }
}

// ---------------------------------------------------------------------------
// Отрисовка
// ---------------------------------------------------------------------------
function drawPanel(x, y, w, h, fill) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x + 1, y + 1, w - 2, h - 2);
}

function drawBar(x, y, w, h, val, max, color) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = PAL.D;
  ctx.fillRect(x, y, w, h);
  var fw = Math.max(0, Math.round(w * val / max));
  ctx.fillStyle = color;
  ctx.fillRect(x, y, fw, h);
}

function drawBackground(depth) {
  ctx.fillStyle = PAL.K;
  ctx.fillRect(0, 0, IW, IH);
  // чем глубже — тем краснее кладка
  var deep = G.floor >= 11;
  ctx.fillStyle = deep ? "#2a1a26" : "#20233a";
  for (var y = 0; y < IH; y += 10) {
    for (var x = -8; x < IW; x += 16) {
      var off = (y / 10) % 2 ? 8 : 0;
      ctx.fillRect(x + off, y, 14, 8);
    }
  }
  var fl = Math.floor(G.time * 6) % 2;
  ctx.fillStyle = PAL.B;
  ctx.fillRect(14, 30, 2, 6); ctx.fillRect(IW - 16, 30, 2, 6);
  ctx.fillStyle = fl ? PAL.O : PAL.Y;
  ctx.fillRect(13, 26, 4, 4); ctx.fillRect(IW - 17, 26, 4, 4);
  ctx.fillStyle = fl ? PAL.Y : PAL.O;
  ctx.fillRect(14, 24, 2, 3); ctx.fillRect(IW - 16, 24, 2, 3);
}

function drawCardFace(x, y, w, h, key, dim, zoneType, zoneI) {
  var c = CARD_DEFS[key];
  drawPanel(x, y, w, h, dim ? PAL.E : PAL.Y);
  ctx.fillStyle = dim ? PAL.S : PAL.W;
  ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
  var ic = SPR[c.icon];
  ctx.drawImage(ic, x + Math.round((w - 9) / 2), y + 3);
  drawTextC(ctx, c.name, x + w / 2, y + 14, PAL.K);
  drawTextC(ctx, c.desc, x + w / 2, y + 21, dim ? PAL.E : PAL.P);
  if (c.desc2) { drawTextC(ctx, c.desc2, x + w / 2, y + 27, dim ? PAL.E : PAL.P); }
  drawPanel(x - 1, y - 1, 7, 7, dim ? PAL.E : PAL.B);
  drawText(ctx, String(c.cost), x + 1, y, PAL.W);
  G.zones.push({ t: zoneType, i: zoneI, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
}

function drawBattle() {
  var shx = G.shake > 0 ? Math.round((Math.random() - 0.5) * 4) : 0;
  ctx.save();
  ctx.translate(shx, 0);

  var e = G.enemy;
  var isBig = e.def.boss || e.def.mini;

  // враг
  var sp = SPR[e.def.key];
  var esc = 3;
  var ew = sp.width * esc, eh = sp.height * esc;
  var ex = Math.round((IW - ew) / 2);
  var ey = 60 - eh + Math.round(Math.sin(G.time * 2.5) * 2);

  if (G.enemyFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.save();
    ctx.filter = "brightness(3)";
    ctx.drawImage(sp, ex, ey, ew, eh);
    ctx.restore();
  } else {
    ctx.drawImage(sp, ex, ey, ew, eh);
  }

  // верхняя панель — поверх спрайта
  var floorTxt = "ЭТАЖ " + G.floor + "/" + FLOORS;
  drawPanel(2, 2, textW(floorTxt) + 5, 9, PAL.K);
  drawText(ctx, floorTxt, 4, 4, isBig ? PAL.R : PAL.W);
  // реликвии
  for (var i = 0; i < G.relics.length; i++) {
    ctx.drawImage(SPR[RELIC_DEFS[G.relics[i]].icon], IW - 12 - i * 11, 3);
  }

  // намерение врага — с тёмной подложкой, поверх спрайта
  var showIntent = (G.phase === "player" || G.phase === "enemyPoison") && G.hp > 0;
  if (showIntent) {
    var ix = 6, iy = 20;
    if (e.stun > 0) {
      drawPanel(ix - 3, iy - 3, 32, 13, PAL.K);
      ctx.drawImage(SPR.mStun, ix, iy);
      drawText(ctx, "СТАН", ix + 8, iy + 1, PAL.Y);
    } else {
      var it = intent();
      if (it === "a") {
        drawPanel(ix - 3, iy - 3, 24, 13, PAL.K);
        ctx.drawImage(SPR.mSword, ix, iy);
        drawText(ctx, String(e.atk), ix + 9, iy + 1, PAL.R);
      } else if (it === "f") {
        drawPanel(ix - 3, iy - 3, 26, 13, PAL.K);
        ctx.drawImage(SPR.mFire, ix, iy);
        drawText(ctx, (e.def.fire || e.atk) + "!", ix + 9, iy + 1, PAL.O);
      } else if (it === "h") {
        drawPanel(ix - 3, iy - 3, 28, 13, PAL.K);
        ctx.drawImage(SPR.mHeal, ix, iy);
        drawText(ctx, "ХИЛ", ix + 9, iy + 1, PAL.L);
      } else {
        drawPanel(ix - 3, iy - 3, 28, 13, PAL.K);
        ctx.drawImage(SPR.mShield, ix, iy);
        drawText(ctx, "ЩИТ", ix + 9, iy + 1, PAL.A);
      }
    }
  }

  drawTextC(ctx, e.name, IW / 2, 64, isBig ? PAL.Y : PAL.W);
  drawBar(IW / 2 - 30, 71, 60, 4, e.hp, e.maxHp, PAL.R);
  drawTextC(ctx, e.hp + "/" + e.maxHp, IW / 2, 77, PAL.W);
  if (e.block > 0) {
    ctx.drawImage(SPR.mShield, IW / 2 + 34, 69);
    drawText(ctx, String(e.block), IW / 2 + 42, 70, PAL.A);
  }
  if (e.poison > 0) {
    ctx.drawImage(SPR.mSkull, IW / 2 - 52, 69);
    drawText(ctx, String(e.poison), IW / 2 - 44, 70, PAL.G);
  }

  // игрок
  var py = 92;
  if (G.playerFlash > 0 && Math.floor(G.time * 30) % 2 === 0) {
    ctx.fillStyle = G.fireFlash > 0 ? "rgba(239,125,87,0.4)" : "rgba(177,62,83,0.35)";
    ctx.fillRect(0, py - 4, IW, 32);
  }
  ctx.drawImage(SPR.heart, 6, py);
  drawBar(16, py + 1, 62, 5, G.hp, G.maxHp, PAL.L);
  drawText(ctx, G.hp + "/" + G.maxHp, 82, py, PAL.W);
  var me = maxEnergy();
  for (i = 0; i < me; i++) {
    if (i < G.energy) {
      ctx.drawImage(SPR.bolt, 8 + i * 8, py + 10);
    } else {
      ctx.fillStyle = PAL.D;
      ctx.fillRect(9 + i * 8, py + 11, 3, 5);
    }
  }
  drawText(ctx, "ЭНЕРГИЯ", 8 + me * 8 + 4, py + 11, PAL.S);
  if (G.block > 0) {
    ctx.drawImage(SPR.mShield, 112, py + 10);
    drawText(ctx, String(G.block), 121, py + 11, PAL.A);
  }

  // рука
  var hy = 126, cw = 26, chh = 34, gap = 2;
  var total = G.hand.length * (cw + gap) - gap;
  var hx0 = Math.round((IW - total) / 2);
  drawText(ctx, "РУКА", 4, hy - 8, PAL.E);
  var pileTxt = G.drawPile.length + "/" + G.discard.length;
  drawText(ctx, pileTxt, IW - textW(pileTxt) - 4, hy - 8, PAL.E);
  for (i = 0; i < G.hand.length; i++) {
    var key = G.hand[i];
    var dim = CARD_DEFS[key].cost > G.energy || G.phase !== "player";
    drawCardFace(hx0 + i * (cw + gap), hy, cw, chh, key, dim, "card", i);
  }
  if (G.hand.length === 0 && G.phase === "player") {
    drawTextC(ctx, "НЕТ КАРТ", IW / 2, hy + 14, PAL.E);
  }

  // кнопка конца хода
  var by = 170, bw = 64, bh = 14;
  var bx = Math.round((IW - bw) / 2);
  var active = G.phase === "player";
  drawPanel(bx, by, bw, bh, active ? PAL.R : PAL.D);
  drawTextC(ctx, "КОНЕЦ ХОДА", bx + bw / 2, by + 5, active ? PAL.W : PAL.E);
  if (active) { G.zones.push({ t: "end", i: 0, x: bx - 2, y: by - 2, w: bw + 4, h: bh + 4 }); }

  if (G.floor === 1 && G.time < 10) {
    drawLines(["ТАП ПО КАРТЕ = СЫГРАТЬ",
               "МЕЧ НАД ВРАГОМ = ЕГО АТАКА",
               "ЩИТ СГОРАЕТ КАЖДЫЙ ХОД"], 192, 8, PAL.S);
  }
  if (e.def.boss) {
    drawTextC(ctx, "ПЛАМЯ БЬЁТ СКВОЗЬ ЩИТ!", IW / 2, 192, PAL.O);
  }

  ctx.restore();
}

function drawReward() {
  drawTextC(ctx, "ПОБЕДА!", IW / 2, 22, PAL.Y, 2);
  drawTextC(ctx, "ЭТАЖ " + G.floor + " ПРОЙДЕН", IW / 2, 40, PAL.W);
  drawTextC(ctx, "ВОЗЬМИ КАРТУ:", IW / 2, 58, PAL.S);

  var cw = 34, chh = 42, gap = 6;
  var total = 3 * (cw + gap) - gap;
  var x0 = Math.round((IW - total) / 2);
  for (var i = 0; i < 3; i++) {
    drawCardFace(x0 + i * (cw + gap), 70, cw, chh, G.rewards[i], false, "reward", i);
  }

  var bw = 84, bh = 14, bx = Math.round((IW - bw) / 2), by = 130;
  drawPanel(bx, by, bw, bh, PAL.T);
  drawTextC(ctx, "ПРОПУСК: ХП +6", bx + bw / 2, by + 5, PAL.W);
  G.zones.push({ t: "skip", i: 0, x: bx - 2, y: by - 2, w: bw + 4, h: bh + 4 });

  ctx.drawImage(SPR.heart, 34, 158);
  drawText(ctx, G.hp + "/" + G.maxHp, 44, 159, PAL.W);
  drawText(ctx, "КОЛОДА " + G.deck.length, 82, 159, PAL.S);
}

function drawRelicChoice() {
  drawTextC(ctx, "СТРАЖ ПОВЕРЖЕН!", IW / 2, 16, PAL.Y, 2);
  drawTextC(ctx, "ХП +10", IW / 2, 34, PAL.L);
  drawTextC(ctx, "ГОЛОС ИЗ ГЛУБИНЫ:", IW / 2, 50, PAL.M);
  drawTextC(ctx, G.voice, IW / 2, 58, PAL.M);
  drawTextC(ctx, "ВЫБЕРИ РЕЛИКВИЮ:", IW / 2, 76, PAL.S);
  drawTextC(ctx, "ОНА ОСТАНЕТСЯ НАВСЕГДА", IW / 2, 84, PAL.E);

  for (var i = 0; i < G.relicChoice.length; i++) {
    var k = G.relicChoice[i];
    var d = RELIC_DEFS[k];
    var w = 120, h = 26;
    var x = Math.round((IW - w) / 2), y = 98 + i * 34;
    drawPanel(x, y, w, h, PAL.N);
    ctx.drawImage(SPR[d.icon], x + 5, y + 8);
    drawText(ctx, d.name, x + 20, y + 5, PAL.Y);
    drawText(ctx, d.desc, x + 20, y + 14, PAL.W);
    G.zones.push({ t: "relic", i: i, x: x - 2, y: y - 2, w: w + 4, h: h + 4 });
  }
}

function drawTitle() {
  drawTextC(ctx, "ДРАКОНЬЕ", IW / 2, 30, PAL.Y, 2);
  drawTextC(ctx, "ПОДЗЕМЕЛЬЕ", IW / 2, 46, PAL.O, 2);

  var sp = SPR.dragon;
  ctx.drawImage(sp, Math.round((IW - sp.width * 3) / 2), 66, sp.width * 3, sp.height * 3);
  ctx.drawImage(SPR.princess, 14, 84, 20, 28);
  ctx.drawImage(SPR.knight, IW - 36, 84, 20, 28);

  drawLines(["КАРТОЧНЫЙ РОГАЛИК", "СПАСИ ПРИНЦЕССУ ОТ ДРАКОНА"], 136, 10, PAL.W);
  drawLines(["15 ЭТАЖЕЙ ВНИЗ",
             "СТРАЖИ НА 5 И 10 ЭТАЖАХ",
             "ЗА НИХ - ВЕЧНЫЕ РЕЛИКВИИ"], 162, 8, PAL.S);
  if (best > 0) { drawTextC(ctx, "РЕКОРД: ЭТАЖ " + best, IW / 2, 194, PAL.L); }
  if (wins > 0) { drawTextC(ctx, "СПАСЕНИЙ: " + wins, IW / 2, 204, PAL.M); }

  if (Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = НАЧАТЬ", IW / 2, 224, PAL.C);
  }
}

function drawIntro() {
  if (G.introIdx === 0) {
    var sp = SPR.dragon;
    ctx.drawImage(sp, Math.round((IW - sp.width * 3) / 2), 40, sp.width * 3, sp.height * 3);
    ctx.drawImage(SPR.princess, IW / 2 + 40, 78, 20, 28);
    drawLines(["ДРАКОН ПОХИТИЛ ПРИНЦЕССУ",
               "И УНЁС ЕЁ НА САМОЕ ДНО",
               "ПОДЗЕМЕЛЬЯ..."], 128, 10, PAL.W);
    drawLines(["ИЗ ГЛУБИНЫ СЛЫШЕН",
               "ЕЁ ГОЛОС: ПОМОГИТЕ!"], 158, 10, PAL.M);
  } else {
    ctx.drawImage(SPR.knight, Math.round(IW / 2 - 15), 36, 30, 42);
    drawLines(["ТЫ - РЫЦАРЬ С КОЛОДОЙ КАРТ.",
               "СПУСТИСЬ НА " + FLOORS + " ЭТАЖЕЙ.",
               "",
               "НА 5 И 10 ЭТАЖАХ - СТРАЖИ.",
               "ЗА НИХ ДАЮТ РЕЛИКВИИ.",
               "",
               "НА ДНЕ ЖДЁТ ДРАКОН.",
               "ЕГО ПЛАМЯ БЬЁТ СКВОЗЬ ЩИТ."], 96, 9, PAL.W);
  }
  if (Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ДАЛЬШЕ", IW / 2, 224, PAL.C);
  }
}

function drawEnding() {
  var t = G.stateTime;
  // дракон падает
  var sp = SPR.dragon;
  var dy = Math.min(1, t / 1.5);
  ctx.save();
  ctx.globalAlpha = 1 - dy * 0.7;
  ctx.drawImage(sp, Math.round((IW - sp.width * 2) / 2), 30 + dy * 20, sp.width * 2, sp.height * 2);
  ctx.restore();

  ctx.drawImage(SPR.knight, IW / 2 - 32, 90, 20, 28);
  ctx.drawImage(SPR.princess, IW / 2 + 12, 90, 20, 28);
  // сердечки
  if (t > 1) {
    var hb = Math.floor(G.time * 3) % 2;
    ctx.drawImage(SPR.heart, IW / 2 - 4, 84 - (hb ? 2 : 0));
  }

  drawTextC(ctx, "ДРАКОН ПОВЕРЖЕН!", IW / 2, 134, PAL.Y, 2);
  drawTextC(ctx, "ПРИНЦЕССА СПАСЕНА!", IW / 2, 152, PAL.M);
  drawLines(["РЫЦАРЬ И ПРИНЦЕССА",
             "ПОДНИМАЮТСЯ К СОЛНЦУ.",
             "КОНЕЦ."], 170, 9, PAL.W);
  drawTextC(ctx, "ВСЕГО СПАСЕНИЙ: " + wins, IW / 2, 204, PAL.L);
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = В НАЧАЛО", IW / 2, 224, PAL.C);
  }
}

function drawDead() {
  ctx.fillStyle = "rgba(26,28,44,0.8)";
  ctx.fillRect(0, 0, IW, IH);
  drawTextC(ctx, "ТЫ ПАЛ", IW / 2, 70, PAL.R, 2);
  drawTextC(ctx, "ЭТАЖ " + G.floor + " ИЗ " + FLOORS, IW / 2, 96, PAL.W);
  drawTextC(ctx, "ПРИНЦЕССА ВСЁ ЕЩЁ ЖДЁТ...", IW / 2, 110, PAL.M);
  if (G.floor >= best && best > 0) {
    drawTextC(ctx, "НОВЫЙ РЕКОРД!", IW / 2, 124, PAL.Y);
  }
  if (G.stateTime > 0.8 && Math.floor(G.time * 2) % 2 === 0) {
    drawTextC(ctx, "ТАП = ЗАНОВО", IW / 2, 150, PAL.C);
  }
}

function draw() {
  G.zones = [];
  drawBackground();
  if (G.state === "title") { drawTitle(); }
  else if (G.state === "intro") { drawIntro(); }
  else if (G.state === "battle") { drawBattle(); }
  else if (G.state === "reward") { drawReward(); }
  else if (G.state === "relic") { drawRelicChoice(); }
  else if (G.state === "ending") { drawEnding(); }
  else if (G.state === "dead") { drawBattle(); drawDead(); }

  for (var i = 0; i < G.floaters.length; i++) {
    var f = G.floaters[i];
    drawTextC(ctx, f.text, f.x, Math.round(f.y), f.color);
  }
}

var lastT = performance.now();
function frame(now) {
  var dt = Math.max(0, Math.min(0.033, (now - lastT) / 1000));
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
